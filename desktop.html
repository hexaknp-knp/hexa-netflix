<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Store | Refurbished Desktops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; }
        .netflix-card { transition: transform 0.3s ease; border: 1px solid #222; }
        .netflix-card:hover { transform: scale(1.05); border-color: #FFD700; z-index: 10; }
        .gold-glow { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.3)); }
    </style>
</head>
<body class="bg-black">

    <nav class="fixed top-0 w-full z-[100] bg-black/90 backdrop-blur-md border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center space-x-3">
            <img src="assets/newlogo.png" alt="Logo" class="h-10 gold-glow">
            <div class="leading-none">
                <span class="block text-yellow-500 font-black text-lg tracking-tighter">HEXA</span>
                <span class="text-[8px] text-gray-400 tracking-[0.3em] uppercase">Computronics</span>
            </div>
        </a>
        <div class="flex items-center space-x-6">
            <input type="text" id="searchInput" placeholder="Search Desktop (e.g. i3, HP)..." 
                   class="hidden md:block bg-zinc-900 border border-zinc-700 text-xs px-4 py-2 rounded-full outline-none focus:border-yellow-500 w-64">
            <a href="index.html" class="text-xs font-bold hover:text-yellow-500 transition uppercase">Home</a>
        </div>
    </nav>

    <header class="pt-32 pb-10 px-6 md:px-12">
        <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter">
            Business <span class="text-yellow-500">Desktops</span>
        </h1>
        <p class="text-gray-500 text-sm mt-2 max-w-xl">Powerful Workstations and Mini PCs for Office & Home. Certified performance with easy EMI.</p>
    </header>

    <main class="px-6 md:px-12 pb-20">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="text-gray-500 animate-pulse">Loading Desktops...</div>
        </div>
    </main>

    <script>
        let allDesktops = [];

        async function fetchDesktops() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                // FILTER: Only Desktops
                allDesktops = data.filter(item => item.category === "Desktop").sort((a,b) => a.price - b.price);
                renderDesktops(allDesktops);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('product-container').innerHTML = "Error loading desktops.";
            }
        }

        function renderDesktops(data) {
            const container = document.getElementById('product-container');
            if(data.length === 0) {
                container.innerHTML = "<p class='text-gray-500'>No desktops available.</p>";
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="netflix-card bg-zinc-900/50 rounded-xl overflow-hidden shadow-2xl">
                    <div class="relative">
                        <img src="${item.image}" alt="${item.model}" class="w-full h-48 object-cover">
                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md text-[10px] px-2 py-1 rounded text-yellow-500 font-bold uppercase">
                            EMI Available
                        </div>
                    </div>
                    <div class="p-5">
                        <h3 class="text-lg font-black tracking-tight text-white uppercase truncate">${item.model}</h3>
                        <p class="text-xs text-gray-400 mt-1">${item.processor} | ${item.ram} | ${item.ssd}</p>
                        
                        <div class="mt-6 flex justify-between items-end">
                            <div>
                                <span class="block text-[10px] text-gray-500 uppercase font-bold">Base Price</span>
                                <span class="text-2xl font-black text-white">₹${item.price.toLocaleString()}</span>
                            </div>
                            <div class="text-right">
                                <span class="block text-[10px] text-blue-400 font-bold uppercase">EMI Starts</span>
                                <span class="text-sm font-bold">₹${Math.round((item.price * 1.18)/12)}/mo</span>
                            </div>
                        </div>

                        <a href="product-details.html?id=${item.id}" 
                           class="block w-full mt-6 bg-yellow-500 text-black py-3 rounded-lg font-black uppercase text-xs text-center tracking-widest hover:bg-yellow-400 transition">
                            View Details
                        </a>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allDesktops.filter(d => 
                d.model.toLowerCase().includes(val) || d.processor.toLowerCase().includes(val)
            );
            renderDesktops(filtered);
        });

        fetchDesktops();
    </script>
</body>
</html>
