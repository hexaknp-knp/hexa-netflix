<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Hexa Computronics Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; --text-dark: #1a1a1a; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: 'Inter', sans-serif; margin: 0; }
        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        .input-field { border: 1px solid #ddd; padding: 12px; border-radius: 4px; width: 100%; outline: none; margin-top: 5px; }
        .input-field:focus { border-color: var(--red); }
        .summary-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 25px; }
    </style>
</head>
<body>

    <nav id="navbar" class="flex justify-between items-center px-6 md:px-12 py-4">
        <div class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Hexa Logo" class="h-10">
            <span class="text-xl text-red-600 font-black tracking-[0.2em] mt-1 uppercase italic leading-none">Hexa Computronics</span>
        </div>
        <button onclick="clearCart()" class="text-xs font-black uppercase text-red-600 italic">Clear Cart</button>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <h1 class="text-2xl font-black italic uppercase border-l-4 border-red-600 pl-4 mb-10">Review Your Order</h1>

        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <h2 class="font-bold uppercase text-sm text-gray-400">1. Delivery Details</h2>
                <div class="space-y-4">
                    <input type="text" id="custName" class="input-field" placeholder="Full Name" required>
                    <input type="tel" id="custPhone" class="input-field" placeholder="WhatsApp Number" required>
                    <textarea id="custAddress" class="input-field" rows="3" placeholder="Address in Kanpur (Area, Landmark, House No)" required></textarea>
                </div>
            </div>

            <div class="summary-box">
                <h2 class="font-bold uppercase text-sm text-red-600 mb-6">2. Order Summary</h2>
                <div id="cart-list" class="space-y-4 border-b pb-6 mb-6"></div>
                
                <div class="space-y-2 text-sm font-bold uppercase text-gray-500 mb-6 border-b pb-4">
                    <div class="flex justify-between"><span>Subtotal</span><span id="subTotal">₹0</span></div>
                    <div class="flex justify-between"><span>GST (18%)</span><span id="gstTotal">₹0</span></div>
                    <div class="flex justify-between"><span>Shipping</span><span id="shipTotal">₹0</span></div>
                </div>

                <div class="flex justify-between font-black italic text-2xl mb-8">
                    <span>GRAND TOTAL:</span>
                    <span id="grandTotal" class="text-red-600">₹0</span>
                </div>

                <button onclick="startRazorpay()" class="w-full bg-red-600 text-white py-4 rounded font-black italic uppercase text-lg shadow-xl hover:scale-105 transition">
                    Pay Now & Confirm
                </button>
            </div>
        </div>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('hexaCart')) || [];
        let finalPayable = 0;

        function renderOrder() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) {
                list.innerHTML = `<p class="text-gray-400">Bhai, cart khali hai!</p>`;
                return;
            }

            let sub = 0;
            list.innerHTML = cart.map((item, idx) => {
                const itemTotal = item.price * item.qty;
                sub += itemTotal;
                return `
                <div class="flex justify-between items-center bg-white p-3 rounded border">
                    <div>
                        <p class="text-xs font-black uppercase italic">${item.name}</p>
                        <p class="text-[10px] text-gray-400">Qty: ${item.qty} x ₹${item.price.toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold">₹${itemTotal.toLocaleString()}</span>
                        <button onclick="removeItem(${idx})" class="text-red-600 text-xs"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');

            const gst = Math.round(sub * 0.18);
            const ship = sub > 10000 || sub === 0 ? 0 : 250;
            finalPayable = sub + gst + ship;

            document.getElementById('subTotal').innerText = "₹" + sub.toLocaleString();
            document.getElementById('gstTotal').innerText = "₹" + gst.toLocaleString();
            document.getElementById('shipTotal').innerText = ship === 0 ? "FREE" : "₹" + ship.toLocaleString();
            document.getElementById('grandTotal').innerText = "₹" + finalPayable.toLocaleString();
        }

        function removeItem(i) { cart.splice(i, 1); localStorage.setItem('hexaCart', JSON.stringify(cart)); renderOrder(); }
        function clearCart() { localStorage.removeItem('hexaCart'); location.reload(); }

        function startRazorpay() {
            const n = document.getElementById('custName').value;
            const p = document.getElementById('custPhone').value;
            const a = document.getElementById('custAddress').value;
            if(!n || !p || !a || cart.length === 0) { alert("Address Details check karein!"); return; }

            const options = {
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": finalPayable * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": "Payment for " + cart.length + " Items",
                "handler": function (res) {
                    const itemsText = cart.map(i => `${i.name}(x${i.qty})`).join(', ');
                    const waText = `*NEW MULTI-ORDER*%0A*Items:* ${itemsText}%0A*Total:* ₹${finalPayable}%0A*Cust:* ${n}%0A*Address:* ${a}%0A*PayID:* ${res.razorpay_payment_id}`;
                    window.open(`https://wa.me/919935529306?text=${waText}`, '_blank');
                    localStorage.removeItem('hexaCart');
                    window.location.href = "success.html";
                },
                "theme": { "color": "#E50914" }
            };
            new Razorpay(options).open();
        }
        window.onload = renderOrder;
    </script>
</body>
</html>
