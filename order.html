<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Hexa Computronics Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; }
        body { background-color: var(--bg); color: #000; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Navbar Branding - NO CHANGE */
        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: #fff; border-bottom: 2px solid #000; }
        
        /* Input & Box Style - Exact Black Border Match */
        .input-field { border: 2px solid #000; padding: 12px; border-radius: 4px; width: 100%; outline: none; margin-top: 5px; font-weight: 700; }
        .input-field:focus { border-color: var(--red); }
        
        .summary-box { background: #fff; border: 2px solid #000; border-radius: 4px; padding: 25px; }
        
        /* Button Style - Exact Match */
        .btn-pay { background: #000; color: #fff; font-weight: 900; text-transform: uppercase; font-style: italic; width: 100%; padding: 20px; border: 2px solid #000; transition: 0.3s; }
        .btn-pay:hover { background: var(--red); border-color: var(--red); }

        /* EMI Box Style - Clean Grey */
        .emi-info-box { background: #f3f4f6; border-left: 4px solid var(--red); padding: 15px; margin: 15px 0; }
    </style>
</head>
<body>

    <nav id="navbar" class="flex justify-between items-center px-6 md:px-12 py-4">
        <div class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Hexa Logo" class="h-10">
            <span class="text-xl text-red-600 font-black tracking-[0.2em] mt-1 uppercase italic leading-none">Hexa Computronics</span>
        </div>
        <button onclick="clearCart()" class="text-[10px] font-black uppercase text-red-600 italic border-b border-red-600">Clear Cart</button>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <h1 class="text-2xl font-black italic uppercase border-l-4 border-black pl-4 mb-10">Review Your Order</h1>
        
        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <h2 class="font-black uppercase text-sm italic tracking-widest text-gray-400">1. Delivery & Contact</h2>
                <div class="space-y-4">
                    <input type="text" id="custName" class="input-field" placeholder="FULL NAME" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="tel" id="custPhone" class="input-field" placeholder="WHATSAPP NO" required>
                        <input type="email" id="custEmail" class="input-field" placeholder="EMAIL ADDRESS" required>
                    </div>
                    <textarea id="custAddress" class="input-field" rows="3" placeholder="COMPLETE ADDRESS IN KANPUR" required></textarea>
                </div>
            </div>

            <div class="summary-box">
                <h2 class="font-black uppercase text-sm mb-6 border-b-2 border-black pb-2 italic">2. Order Summary</h2>
                <div id="cart-list" class="space-y-4 mb-6"></div>
                
                <div class="space-y-2 text-[11px] font-black uppercase border-t-2 border-black pt-4">
                    <div class="flex justify-between"><span>Subtotal</span><span id="subTotal">₹0</span></div>
                    <div class="flex justify-between"><span>GST (18%)</span><span id="gstTotal">₹0</span></div>
                    <div class="flex justify-between border-b-2 border-black pb-4"><span>Shipping</span><span id="shipTotal">₹0</span></div>
                </div>

                <div class="emi-info-box">
                    <p class="text-[10px] font-black uppercase text-gray-500 italic">Estimated EMI</p>
                    <p id="emiDisplay" class="text-2xl font-black italic text-black mt-1">₹0/mo*</p>
                    <p class="text-[9px] font-bold text-gray-400 mt-2 leading-tight">
                        * YOU CAN OPT FOR EMI ON THE PAYMENT PAGE. INTEREST RATES WILL BE APPLICABLE AS PER YOUR BANK'S POLICY.
                    </p>
                </div>

                <div class="flex justify-between text-2xl font-black italic pt-2 mb-8">
                    <span>TOTAL:</span>
                    <span id="grandTotal" class="text-red-600">₹0</span>
                </div>

                <button onclick="startRazorpay()" class="btn-pay">Pay Now & Confirm</button>
            </div>
        </div>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('hexaCart')) || [];
        let finalPayable = 0;

        function renderOrder() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) { list.innerHTML = `<p class="font-bold italic text-gray-400 uppercase text-center py-10">Cart is empty!</p>`; return; }
            
            let sub = 0;
            list.innerHTML = cart.map((item, idx) => {
                const itemTotal = item.price * item.qty;
                sub += itemTotal;
                return `<div class="flex justify-between items-center border-b border-gray-100 pb-2">
                    <div>
                        <p class="text-xs font-black uppercase italic">${item.name}</p>
                        <p class="text-[9px] font-bold text-gray-400 uppercase">Qty: ${item.qty} x ₹${item.price.toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black italic">₹${itemTotal.toLocaleString()}</span>
                        <button onclick="removeItem(${idx})" class="text-red-600"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>`;
            }).join('');

            const gst = Math.round(sub * 0.18);
            const ship = sub > 10000 || sub === 0 ? 0 : 250;
            finalPayable = sub + gst + ship;
            
            // EMI Calculation for Display
            const emiValue = Math.round((finalPayable * 1.15) / 12);

            document.getElementById('subTotal').innerText = "₹" + sub.toLocaleString();
            document.getElementById('gstTotal').innerText = "₹" + gst.toLocaleString();
            document.getElementById('shipTotal').innerText = ship === 0 ? "FREE" : "₹" + ship.toLocaleString();
            document.getElementById('grandTotal').innerText = "₹" + finalPayable.toLocaleString();
            document.getElementById('emiDisplay').innerText = "₹" + emiValue.toLocaleString() + "/MO*";
        }

        function startRazorpay() {
            const n = document.getElementById('custName').value;
            const p = document.getElementById('custPhone').value;
            const e = document.getElementById('custEmail').value;
            const a = document.getElementById('custAddress').value;

            if(!n || !p || !e || !a || cart.length === 0) { 
                alert("Bhai, sari details bhariye!"); 
                return; 
            }

            const options = {
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": finalPayable * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": "Bulk Order Payment",
                "prefill": { "name": n, "email": e, "contact": p },
                "handler": function (res) {
                    const itemsText = cart.map(i => `${i.name}(x${i.qty})`).join(', ');
                    const waText = `*ORDER PLACED - HEXA*\n*Items:* ${itemsText}\n*Total:* ₹${finalPayable}\n*Cust:* ${n}\n*PayID:* ${res.razorpay_payment_id}`;
                    window.open(`https://wa.me/919935529306?text=${encodeURIComponent(waText)}`, '_blank');
                    localStorage.removeItem('hexaCart');
                    window.location.href = "success.html";
                },
                "theme": { "color": "#000000" }
            };
            new Razorpay(options).open();
        }

        function removeItem(i) { cart.splice(i, 1); localStorage.setItem('hexaCart', JSON.stringify(cart)); renderOrder(); }
        function clearCart() { localStorage.removeItem('hexaCart'); location.reload(); }
        window.onload = renderOrder;
    </script>
</body>
</html>
