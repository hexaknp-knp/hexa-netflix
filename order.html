<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Hexa Computronics Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; --text-dark: #1a1a1a; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: 'Inter', sans-serif; margin: 0; }
        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        .input-field { border: 1px solid #ddd; padding: 12px; border-radius: 4px; width: 100%; outline: none; margin-top: 5px; }
        .input-field:focus { border-color: var(--red); }
        .summary-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 25px; }
    </style>
</head>
<body>

    <nav id="navbar" class="flex justify-between items-center px-6 md:px-12 py-4">
        <div class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Hexa Logo" class="h-10">
            <span class="text-xl text-red-600 font-black tracking-[0.2em] mt-1 uppercase italic leading-none">Hexa Computronics</span>
        </div>
        <a href="index.html" class="text-xs font-bold uppercase text-gray-500 italic">Back to Mall</a>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <h1 class="text-2xl font-black italic uppercase border-l-4 border-red-600 pl-4 mb-10">Secure Checkout</h1>

        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <h2 class="font-bold uppercase text-sm text-gray-400">1. Delivery Address</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-gray-500">Full Name</label>
                        <input type="text" id="custName" class="input-field" placeholder="Enter Name" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-gray-500">WhatsApp Number</label>
                        <input type="tel" id="custPhone" class="input-field" placeholder="+91 99355XXXXX" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-gray-500">Full Address (Kanpur Delivery)</label>
                        <textarea id="custAddress" class="input-field" rows="3" placeholder="Shop/House No, Area, Near Landmark" required></textarea>
                    </div>
                </div>
            </div>

            <div class="summary-box">
                <h2 class="font-bold uppercase text-sm text-red-600 mb-6">2. Order Summary</h2>
                <div id="product-info" class="border-b pb-6 mb-6">
                    <p id="pName" class="text-lg font-black italic uppercase">Loading...</p>
                    <p id="pPrice" class="text-2xl font-black text-red-600 mt-2">₹0</p>
                </div>
                
                <div class="flex justify-between font-black italic text-xl mb-8">
                    <span>Total Amount:</span>
                    <span id="finalTotal">₹0</span>
                </div>

                <button onclick="startRazorpay()" class="w-full bg-red-600 text-white py-4 rounded font-black italic uppercase text-lg shadow-xl hover:scale-105 transition">
                    Complete Payment
                </button>
            </div>
        </div>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        let selectedProduct = null;

        async function initOrder() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data.json');
            const data = await res.json();
            selectedProduct = data.find(p => p.id === id);

            if(selectedProduct) {
                document.getElementById('pName').innerText = selectedProduct.model;
                document.getElementById('pPrice').innerText = "₹" + selectedProduct.price.toLocaleString();
                document.getElementById('finalTotal').innerText = "₹" + selectedProduct.price.toLocaleString();
            }
        }

        function startRazorpay() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;

            if(!name || !phone || !address) { alert("Please fill address details!"); return; }

            const options = {
                "key": "rzp_live_SLFCOQlEEX9giJ", // Aapki Key
                "amount": selectedProduct.price * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": selectedProduct.model,
                "handler": function (response) {
                    // Payment success message for WhatsApp
                    const text = `*ORDER PLACED*%0A*Product:* ${selectedProduct.model}%0A*Customer:* ${name}%0A*Phone:* ${phone}%0A*Address:* ${address}%0A*PaymentID:* ${response.razorpay_payment_id}`;
                    window.open(`https://wa.me/919935529306?text=${text}`, '_blank');
                    window.location.href = "success.html";
                },
                "theme": { "color": "#E50914" }
            };
            new Razorpay(options).open();
        }
        window.onload = initOrder;
    </script>
</body>
</html>
