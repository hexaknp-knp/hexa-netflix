<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Checkout | Hexa Computronics Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; }
        body { 
            background-color: var(--bg); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden;
            background-image: linear-gradient(to right, rgba(255,255,255,0.7), rgba(255,255,255,0.4)), url('https://images.pexels.com/photos/2106216/pexels-photo-2106216.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-attachment: fixed; background-size: cover;
        }
        #navbar { position: sticky; top: 0; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid #000; }
        
        .input-field { border: 2px solid #000; padding: 8px; border-radius: 4px; width: 100%; outline: none; font-weight: 800; background: #fff; font-size: 14px !important; margin-bottom: 8px; }
        .summary-box { background: #fff; border: 3px solid #000; padding: 12px; border-radius: 4px; box-shadow: 10px 10px 0px rgba(0,0,0,0.1); }
        .btn-pay { background: #000; color: #fff; font-weight: 900; text-transform: uppercase; width: 100%; padding: 12px; border: 3px solid #000; font-style: italic; }
        
        .footer-heading { color: var(--red); font-weight: 900; text-transform: uppercase; font-size: 11px; margin-bottom: 10px; display: block; }
        .footer-item { color: #333; font-size: 10px; font-weight: 600; text-transform: uppercase; }

        @media (max-width: 768px) {
            main { padding-top: 10px !important; }
            h1 { font-size: 1.5rem !important; margin-bottom: 10px !important; }
            .input-field { padding: 6px !important; margin-bottom: 5px !important; }
            .summary-box { margin-top: 10px !important; padding: 10px !important; }
            .emi-info-box { padding: 8px !important; margin: 8px 0 !important; }
            #grandTotal { font-size: 1.5rem !important; }
        }
    </style>
</head>
<body>

    <nav id="navbar" class="flex justify-between items-center px-4 py-2">
        <a href="index.html" class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Logo" class="h-7">
            <span class="text-[9px] text-red-600 font-black tracking-widest uppercase italic">Hexa Computronics</span>
        </a>
        <button onclick="clearCart()" class="text-[9px] font-black uppercase text-red-600 border-b border-red-600">Clear</button>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-4 relative z-10">
        <h1 class="text-2xl font-black italic uppercase border-l-4 border-red-600 pl-3 mb-4 text-black">Checkout</h1>
        
        <div class="grid lg:grid-cols-2 gap-4">
            <div class="space-y-2">
                <p class="font-black uppercase text-[10px] text-gray-500">1. Delivery Info</p>
                <input type="text" id="custName" class="input-field" placeholder="NAME">
                <div class="flex gap-2">
                    <input type="tel" id="custPhone" class="input-field" placeholder="WHATSAPP">
                    <input type="email" id="custEmail" class="input-field" placeholder="EMAIL">
                </div>
                <textarea id="custAddress" class="input-field" rows="2" placeholder="KANPUR ADDRESS"></textarea>
            </div>

            <div class="summary-box">
                <p class="font-black uppercase text-[10px] mb-2 border-b pb-1 text-gray-500">2. Summary</p>
                <div id="cart-list" class="space-y-1 max-h-32 overflow-y-auto mb-3"></div>
                
                <div class="text-[9px] font-black uppercase border-t pt-2 space-y-1">
                    <div class="flex justify-between"><span>Subtotal</span><span id="subTotal">₹0</span></div>
                    <div class="flex justify-between border-b pb-1"><span>GST(18%) + Ship</span><span id="gstTotal">₹0</span></div>
                </div>

                <div class="bg-red-50 p-2 border-l-4 border-red-600 my-2">
                    <p id="emiDisplay" class="text-lg font-black italic text-black leading-none">₹0/mo*</p>
                    <p class="text-[7px] font-bold text-gray-500 uppercase">Bank EMI Available</p>
                </div>

                <div class="flex justify-between items-center mb-3">
                    <span class="font-black text-xs">PAYABLE:</span>
                    <span id="grandTotal" class="text-2xl font-black text-red-600 italic">₹0</span>
                </div>

                <button onclick="startRazorpay()" class="btn-pay text-sm">Confirm & Pay</button>
            </div>
        </div>
    </main>

    <footer class="bg-gray-100 py-10 px-6 border-t-4 border-black text-gray-700 relative z-10">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 max-w-7xl mx-auto text-left">
            <div><span class="footer-heading">Quick Links</span><ul class="space-y-1"><li><a href="index.html" class="footer-item">Home</a></li><li><a href="laptops.html" class="footer-item">Laptops</a></li></ul></div>
            <div><span class="footer-heading">Support</span><ul class="space-y-1"><li><a href="shipping-policy.html" class="footer-item">Shipping</a></li><li><a href="legal.html" class="footer-item">Legal</a></li></ul></div>
            <div><span class="footer-heading text-red-600">Contact</span><p class="footer-item leading-tight">Gumti No.5, Kanpur</p><p class="footer-item font-black">+91 9935529306</p></div>
            <div class="text-right">
                <span class="footer-heading">Social</span>
                <div class="flex justify-end gap-4 text-xl"><i class="fab fa-youtube text-red-600"></i> <i class="fab fa-facebook text-blue-600"></i></div>
            </div>
        </div>
    </footer>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('hexaCart')) || [];
        let finalPayable = 0;

        function renderOrder() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) { list.innerHTML = `<p class="text-[10px] font-bold text-center">Cart Empty</p>`; return; }
            
            let sub = 0;
            list.innerHTML = cart.map((item, idx) => {
                const itemTotal = item.price * item.qty;
                sub += itemTotal;
                return `<div class="flex justify-between items-center text-[10px] border-b pb-1">
                    <span class="font-black uppercase truncate w-32">${item.name}</span>
                    <div class="flex items-center gap-2">
                        <span class="font-bold">₹${itemTotal.toLocaleString()}</span>
                        <button onclick="removeItem(${idx})" class="text-red-600 text-[8px]"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');

            const gst = Math.round(sub * 0.18);
            const ship = sub > 15000 ? 0 : 250;
            finalPayable = sub + gst + ship;
            
            document.getElementById('subTotal').innerText = "₹" + sub.toLocaleString();
            document.getElementById('gstTotal').innerText = "₹" + (gst + ship).toLocaleString();
            document.getElementById('grandTotal').innerText = "₹" + finalPayable.toLocaleString();
            document.getElementById('emiDisplay').innerText = "₹" + Math.round((finalPayable * 1.15) / 12).toLocaleString() + "/mo*";
        }

        function startRazorpay() {
            const n = document.getElementById('custName').value;
            const p = document.getElementById('custPhone').value;
            if(!n || !p || cart.length === 0) return alert("Fill details!");
            const options = {
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": finalPayable * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "prefill": { "name": n, "contact": p },
                "handler": function (res) {
                    window.open(`https://wa.me/919935529306?text=OrderPlaced_PayID_${res.razorpay_payment_id}`, '_blank');
                    localStorage.removeItem('hexaCart');
                    window.location.href = "success.html";
                },
                "theme": { "color": "#E50914" }
            };
            new Razorpay(options).open();
        }
        function removeItem(i) { cart.splice(i, 1); localStorage.setItem('hexaCart', JSON.stringify(cart)); renderOrder(); }
        function clearCart() { localStorage.removeItem('hexaCart'); location.reload(); }
        window.onload = renderOrder;
    </script>
</body>
</html>
