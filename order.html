<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Hexa Computronics Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; }
        body { background-color: var(--bg); color: #000; font-family: 'Inter', sans-serif; margin: 0; }
        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: #fff; border-bottom: 2px solid #000; }
        .input-field { border: 2px solid #000; padding: 12px; border-radius: 4px; width: 100%; outline: none; margin-top: 5px; }
        .input-field:focus { border-color: var(--red); }
        .summary-box { background: #fff; border: 2px solid #000; border-radius: 4px; padding: 25px; }
        .btn-pay { background: #000; color: #fff; font-weight: 900; text-transform: uppercase; font-style: italic; width: 100%; padding: 20px; border: 2px solid #000; }
        .btn-pay:hover { background: var(--red); border-color: var(--red); }
    </style>
</head>
<body>

    <nav id="navbar" class="flex justify-between items-center px-6 md:px-12 py-4">
        <div class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Hexa Logo" class="h-10">
            <span class="text-xl text-red-600 font-black tracking-[0.2em] mt-1 uppercase italic leading-none">Hexa Computronics</span>
        </div>
        <button onclick="clearCart()" class="text-xs font-black uppercase text-red-600 italic">Clear Cart</button>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <h1 class="text-2xl font-black italic uppercase border-l-4 border-black pl-4 mb-10">Review Your Order</h1>
        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <h2 class="font-bold uppercase text-sm">1. Delivery & Contact Details</h2>
                <div class="space-y-4">
                    <input type="text" id="custName" class="input-field" placeholder="Full Name" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="tel" id="custPhone" class="input-field" placeholder="WhatsApp Number" required>
                        <input type="email" id="custEmail" class="input-field" placeholder="Email Address" required>
                    </div>
                    <textarea id="custAddress" class="input-field" rows="3" placeholder="Address in Kanpur" required></textarea>
                </div>
            </div>
            <div class="summary-box">
                <h2 class="font-bold uppercase text-sm mb-6 border-b-2 border-black pb-2">2. Order Summary</h2>
                <div id="cart-list" class="space-y-4 mb-6"></div>
                <div class="space-y-2 text-sm font-bold uppercase border-t-2 border-black pt-4 mb-6">
                    <div class="flex justify-between"><span>Subtotal</span><span id="subTotal">₹0</span></div>
                    <div class="flex justify-between"><span>GST (18%)</span><span id="gstTotal">₹0</span></div>
                    <div class="flex justify-between border-b-2 border-black pb-2"><span>Shipping</span><span id="shipTotal">₹0</span></div>
                    <div class="flex justify-between text-2xl font-black italic pt-2"><span>TOTAL:</span><span id="grandTotal">₹0</span></div>
                </div>
                <button onclick="startRazorpay()" class="btn-pay">Pay Now & Confirm</button>
            </div>
        </div>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('hexaCart')) || [];
        let finalPayable = 0;

        function renderOrder() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) { list.innerHTML = `<p>Cart is empty!</p>`; return; }
            let sub = 0;
            list.innerHTML = cart.map((item, idx) => {
                const itemTotal = item.price * item.qty;
                sub += itemTotal;
                return `<div class="flex justify-between items-center border-b border-gray-200 pb-2">
                    <div><p class="text-xs font-black uppercase italic">${item.name}</p><p class="text-[10px]">Qty: ${item.qty}</p></div>
                    <span class="font-bold">₹${itemTotal.toLocaleString()}</span>
                </div>`;
            }).join('');
            const gst = Math.round(sub * 0.18);
            const ship = sub > 10000 || sub === 0 ? 0 : 250;
            finalPayable = sub + gst + ship;
            document.getElementById('subTotal').innerText = "₹" + sub.toLocaleString();
            document.getElementById('gstTotal').innerText = "₹" + gst.toLocaleString();
            document.getElementById('shipTotal').innerText = ship === 0 ? "FREE" : "₹" + ship.toLocaleString();
            document.getElementById('grandTotal').innerText = "₹" + finalPayable.toLocaleString();
        }

        function startRazorpay() {
            const n = document.getElementById('custName').value;
            const p = document.getElementById('custPhone').value;
            const e = document.getElementById('custEmail').value;
            const a = document.getElementById('custAddress').value;
            if(!n || !p || !e || !a || cart.length === 0) { alert("Details check karein!"); return; }

            new Razorpay({
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": finalPayable * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": "Multi-Order",
                "prefill": { "name": n, "email": e, "contact": p },
                "handler": function (res) {
                    const waText = `*ORDER PLACED*%0A*Items:* ${cart.length}%0A*Total:* ₹${finalPayable}%0A*PayID:* ${res.razorpay_payment_id}`;
                    window.open(`https://wa.me/919935529306?text=${waText}`, '_blank');
                    localStorage.removeItem('hexaCart');
                    window.location.href = "success.html";
                },
                "theme": { "color": "#000000" }
            }).open();
        }
        function clearCart() { localStorage.removeItem('hexaCart'); location.reload(); }
        window.onload = renderOrder;
    </script>
</body>
</html>
