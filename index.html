<style>
    /* Naya Grid Style jo Vertical Scroll karega */
    .product-grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); /* Desktop pe 4 products ek line mein */
        gap: 20px; 
        padding: 20px 0; 
    }

    @media (max-width: 1024px) {
        .product-grid { grid-template-columns: repeat(3, 1fr); } /* Tablets pe 3 */
    }

    @media (max-width: 768px) {
        .product-grid { 
            grid-template-columns: repeat(2, 1fr); /* Mobile pe 2 products ek line mein */
            gap: 10px; 
        }
        .card { min-width: unset; } /* Mobile fix */
    }
</style>
