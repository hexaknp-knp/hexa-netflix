<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Computronics | Premium Refurbished Tech Mall Kanpur</title>
    <meta name="description" content="Hexa Computronics Kanpur offers premium refurbished business laptops, desktops, and accessories.">
    
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://images.unsplash.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --red: #E50914; --bg: #ffffff; --card-bg: #f9f9f9; --text-dark: #1a1a1a; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Optimized Animations for Mobile */
        .marquee-bar { background: linear-gradient(90deg, #831010, #E50914); color: white; padding: 14px 0; font-size: 13px; font-weight: 800; text-transform: uppercase; z-index: 1001; position: relative; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .marquee-content { display: inline-block; animation: marquee 25s linear infinite; white-space: nowrap; will-change: transform; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .offer-bar { background: #000; color: #fff; padding: 8px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: center; gap: 20px; overflow: hidden; }
        .wiggle-text { color: #ffcc00; animation: wiggle 2s ease-in-out infinite; display: inline-block; }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }

        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; transition: 0.3s; }

        .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 25px 0; scrollbar-width: none; -ms-overflow-style: none; }
        .netflix-row::-webkit-scrollbar { display: none; }

        .card { transition: transform 0.4s ease, box-shadow 0.4s ease; min-width: 280px; background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #eee; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { transform: scale(1.05); z-index: 50; border-color: var(--red); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 160px; object-fit: contain; background: #fff; padding: 15px; }

        .section-label { font-size: 1.5rem; font-weight: 800; border-left: 5px solid var(--red); padding-left: 15px; margin-top: 50px; text-transform: uppercase; font-style: italic; color: var(--text-dark); }
        .hero-vignette { background: linear-gradient(to top, #fff 5%, transparent 60%), linear-gradient(to right, rgba(255,255,255,0.8) 10%, transparent 80%); }
        
        .footer-link-head { color: var(--text-dark); font-weight: 900; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; margin-bottom: 20px; }
        .footer-link { color: #666; font-size: 14px; transition: 0.3s; }
        .footer-link:hover { color: var(--red); }

        #quoteModal, #searchModal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-inner { background: #fff; border: 2px solid var(--red); padding: 30px; border-radius: 10px; width: 100%; max-w-md; box-shadow: 0 20px 40px rgba(0,0,0,0.2); color: #000; }
    </style>
</head>
<body>

    <div class="marquee-bar"><div class="marquee-content">⚡ SAME DAY DELIVERY IN KANPUR &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 💳 EASY EMI ON ALL BANK CARDS &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ⭐ 100% CERTIFIED BUSINESS HARDWARE</div></div>

    <div class="offer-bar">
        <span>🔥 <span class="wiggle-text">LIMITED TIME OFFER</span></span>
        <span class="hidden md:inline">|</span>
        <span>⚠️ <span class="wiggle-text">LIMITED STOCK LEFT</span></span>
    </div>

    <nav id="navbar" class="flex justify-between items-center px-6 md:px-12 py-4">
        <a href="index.html" class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Hexa Computronics Logo" class="h-10">
            <span class="text-xl text-red-600 font-black tracking-[0.2em] mt-1 uppercase italic leading-none">Hexa Computronics</span>
        </a>
        <div class="flex items-center space-x-6 text-2xl">
            <button onclick="openSearch()" aria-label="Search" class="hover:text-red-600 text-gray-700 transition"><i class="fas fa-search"></i></button>
            <button onclick="openQuote()" class="bg-red-600 text-white text-xs px-6 py-2 rounded font-black italic shadow-lg hover:scale-105 transition uppercase">Get Quote</button>
        </div>
    </nav>

    <header class="relative h-[85vh] w-full bg-cover bg-center flex items-center px-6 md:px-12" style="background-image: url('https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=1200&q=70');">
        <div class="absolute inset-0 hero-vignette"></div>
        <div class="relative z-10 max-w-2xl mt-10">
            <h1 class="text-6xl md:text-8xl font-black mb-4 uppercase italic leading-none text-black">Premium <span class="text-red-600">Refurbished</span></h1>
            <p class="text-lg mb-8 text-gray-600 font-bold uppercase tracking-widest italic tracking-tighter leading-none">Kanpur's Professional Tech Mall</p>
            <a href="laptops.html" class="bg-black text-white px-12 py-3 rounded font-black italic shadow-2xl hover:bg-red-600 transition inline-block uppercase">▶ Browse Store</a>
        </div>
    </header>

    <main class="relative z-20 -mt-24 px-6 md:px-12 space-y-12 pb-20">
        <section><h2 class="section-label italic">Enterprise Laptops</h2><div id="laptop-row" class="netflix-row"></div></section>
        <section><h2 class="section-label italic">Business Desktops</h2><div id="desktop-row" class="netflix-row"></div></section>
    </main>

    <script>
        let fullData = [];
        async function init() {
            try {
                const res = await fetch('data.json');
                fullData = await res.json();
                loadRows();
            } catch (e) { console.error("Data fail"); }
        }

        function loadRows() {
            const createCard = (item) => `
                <div class="card" onclick="location.href='product-details.html?id=${item.id}'">
                    <div class="relative">
                        <img src="${item.images[0]}" alt="${item.model}" loading="lazy">
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-sm text-black truncate uppercase italic tracking-tighter">${item.model}</h3>
                        <p class="text-[10px] text-gray-400 mt-1 uppercase font-black tracking-widest">${item.processor || ''}</p>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="text-base font-black text-black italic">₹${item.price.toLocaleString()}</span>
                        </div>
                    </div>
                </div>`;
            document.getElementById('laptop-row').innerHTML = fullData.filter(i => i.category === "Laptop").map(createCard).join('');
            document.getElementById('desktop-row').innerHTML = fullData.filter(i => i.category === "Desktop").map(createCard).join('');
        }

        window.onload = init;
        
        function openSearch() { document.getElementById('searchModal').style.display = 'flex'; }
        function closeSearch() { document.getElementById('searchModal').style.display = 'none'; }
        function openQuote() { document.getElementById('quoteModal').style.display = 'flex'; }
        function closeQuote() { document.getElementById('quoteModal').style.display = 'none'; }
    </script>
</body>
</html>
