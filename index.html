<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="canonical" href="https://hexacomputer.in/" />
    <link rel="icon" type="image/png" href="assets/newlogo.png">
    
    <title>Hexa Computronics | Best Refurbished Laptops & Desktops Kanpur</title>
    
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root { --red: #E50914; --bg: #ffffff; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        /* Image Optimization Display */
        img { content-visibility: auto; }
        .netflix-row { display: flex; overflow-x: auto; gap: 12px; padding: 15px 0; scrollbar-width: none; }
        .card { min-width: 200px; background: #fff; border: 2px solid #000; border-radius: 4px; flex-shrink: 0; }
        .card img { width: 100%; height: 120px; object-fit: contain; }
        @media (max-width: 768px) {
            .card { min-width: 160px; }
            .hero-title { font-size: 1.8rem !important; }
        }
    </style>
</head>
<body>
    <script>
        // Lazy Load Logic for Mobile Speed
        let fullData = [];
        async function init() {
            const res = await fetch('data.json');
            fullData = await res.json();
            loadRows();
        }

        function loadRows() {
            const createCard = (item) => `
            <div class="card" onclick="location.href='product-details.html?id=${item.id}'">
                <img src="${item.images[0]}" alt="${item.model}" loading="lazy" width="200" height="120">
                <div class="p-2">
                    <h3 class="font-bold text-[10px] uppercase truncate">${item.model}</h3>
                    <p class="text-[12px] font-black text-red-600">₹${item.price.toLocaleString()}</p>
                </div>
            </div>`;
            
            const laptops = fullData.filter(i => i.category === "Laptop").slice(0, 4);
            document.getElementById('laptop-row').innerHTML = laptops.map(createCard).join('');
            // ... baaki rows bhi isi tarah slice(0, 4) karke load karein
        }
        window.onload = init;
    </script>
</body>
</html>
