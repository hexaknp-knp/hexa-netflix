<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Computronics | Premium Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --deep-bg: #0a0c10; --card-bg: #161b22; }
        body { background-color: var(--deep-bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .marquee-bar { background: linear-gradient(90deg, #003366, #0056b3); color: white; overflow: hidden; white-space: nowrap; padding: 8px 0; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .marquee-content { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 20px 0; scrollbar-width: none; }
        .netflix-row::-webkit-scrollbar { display: none; }
        .card { transition: transform 0.4s ease; min-width: 280px; background: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.05); border: 1px solid var(--gold); z-index: 10; }
        .card img { width: 100%; height: 180px; object-fit: contain; background: #000; padding: 15px; }
        .section-label { font-size: 1.5rem; font-weight: 800; border-left: 5px solid var(--gold); padding-left: 15px; margin-top: 40px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="marquee-bar"><div class="marquee-content">⚡ SAME DAY DELIVERY IN KANPUR &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 💳 EASY EMI ON ALL BANK CARDS &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ⭐ CERTIFIED STOCK</div></div>
    
    <nav class="p-6 flex justify-between items-center border-b border-zinc-800">
        <img src="assets/newlogo.png" class="h-10">
        <div class="space-x-6 text-[10px] font-bold uppercase tracking-widest">
            <a href="index.html" class="text-yellow-500">Home</a>
            <a href="laptops.html" class="text-gray-400">Laptops</a>
        </div>
    </nav>

    <main class="px-6 md:px-12 pb-20">
        <section><h2 class="section-label">Laptops</h2><div id="laptop-row" class="netflix-row"></div></section>
        <section><h2 class="section-label">Desktops</h2><div id="desktop-row" class="netflix-row"></div></section>
    </main>

    <script>
        let fullData = [];
        async function init() {
            const res = await fetch('data.json');
            fullData = await res.json();
            const createCard = (item) => {
                const months = item.emi_months || 12;
                const emi = Math.round((item.price * 1.18) / months);
                return `<div class="card" onclick="location.href='product-details.html?id=${item.id}'">
                    <div class="relative"><img src="${item.image}"><div class="absolute top-2 right-2 bg-black/80 text-yellow-500 text-[8px] px-2 py-1 rounded font-bold">₹${emi}/MO*</div></div>
                    <div class="p-5">
                        <div class="flex gap-1 mb-2"><i class="fas fa-star text-yellow-500 text-[10px]"></i><i class="fas fa-star text-yellow-500 text-[10px]"></i><i class="fas fa-star text-yellow-500 text-[10px]"></i><i class="fas fa-star text-yellow-500 text-[10px]"></i><i class="fas fa-star text-yellow-500 text-[10px]"></i></div>
                        <h3 class="font-bold text-sm text-white truncate uppercase">${item.model}</h3>
                        <p class="text-[10px] text-gray-500 mt-2 uppercase">${item.processor} | ${item.ram}</p>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="text-base font-black text-white italic">₹${item.price.toLocaleString()}</span>
                            <span class="text-[7px] text-gray-500 italic uppercase">*Bank Int. extra</span>
                        </div>
                    </div>
                </div>`;
            };
            document.getElementById('laptop-row').innerHTML = fullData.filter(i => i.category === "Laptop").map(createCard).join('');
            document.getElementById('desktop-row').innerHTML = fullData.filter(i => i.category === "Desktop").map(createCard).join('');
        }
        window.onload = init;
    </script>
</body>
</html>
