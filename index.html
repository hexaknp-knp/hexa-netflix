<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Hexa Computronics | Premium Refurbished Tech Mall Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; --text-dark: #1a1a1a; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .marquee-bar { background: linear-gradient(90deg, #831010, #E50914); color: white; padding: 14px 0; font-size: 13px; font-weight: 800; text-transform: uppercase; z-index: 1001; position: relative; }
        .marquee-content { display: inline-block; animation: marquee 25s linear infinite; white-space: nowrap; will-change: transform; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .offer-bar { background: #000; color: #fff; padding: 8px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; justify-content: center; gap: 20px; overflow: hidden; }
        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 25px 0; scrollbar-width: none; }
        .card { transition: transform 0.4s ease; min-width: 280px; background: #f9f9f9; border-radius: 8px; overflow: hidden; border: 1px solid #eee; cursor: pointer; }
        .card:hover { transform: scale(1.05); border-color: var(--red); }
        .card img { width: 100%; height: 160px; object-fit: contain; background: #fff; padding: 15px; }
        .section-label { font-size: 1.5rem; font-weight: 800; border-left: 5px solid var(--red); padding-left: 15px; margin-top: 50px; text-transform: uppercase; font-style: italic; }
        @media (max-width: 768px) {
            header.relative { height: 50vh !important; }
            .hero-title { font-size: 2.8rem !important; }
        }
    </style>
</head>
<body>
    <div class="marquee-bar"><div class="marquee-content">⚡ SAME DAY DELIVERY IN KANPUR &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 💳 EASY EMI ON ALL BANK CARDS</div></div>
    <nav id="navbar" class="flex justify-between items-center px-6 md:px-12 py-4">
        <a href="index.html" class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Logo" class="h-10">
            <span class="text-xl text-red-600 font-black tracking-widest uppercase italic leading-none">Hexa Computronics</span>
        </a>
        <div class="hidden lg:flex space-x-8 text-[11px] font-bold uppercase tracking-widest">
            <a href="index.html" class="text-red-600 border-b-2 border-red-600">Home</a>
            <a href="laptops.html" class="text-gray-500 hover:text-black">Laptops</a>
            <a href="desktops.html" class="text-gray-500 hover:text-black">Desktops</a>
        </div>
        <button onclick="openQuote()" class="bg-red-600 text-white text-xs px-6 py-2 rounded font-black uppercase italic">Get Quote</button>
    </nav>

    <header class="relative h-[85vh] w-full bg-cover bg-center flex items-center px-6 md:px-12" style="background-image: url('https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=1200&q=80');">
        <div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent opacity-80"></div>
        <div class="relative z-10">
            <h1 class="hero-title text-6xl md:text-8xl font-black uppercase italic leading-none text-black">Premium <span class="text-red-600">Refurbished</span></h1>
            <p class="text-lg mb-8 text-gray-600 font-bold uppercase italic">Kanpur's Professional Tech Mall</p>
            <a href="laptops.html" class="bg-black text-white px-12 py-3 rounded font-black italic uppercase">▶ Browse Store</a>
        </div>
    </header>

    <main class="relative z-20 -mt-24 px-6 md:px-12 space-y-12 pb-20">
        <section><h2 class="section-label">Enterprise Laptops</h2><div id="laptop-row" class="netflix-row"></div></section>
        <section><h2 class="section-label">Business Desktops</h2><div id="desktop-row" class="netflix-row"></div></section>
    </main>

    <footer class="bg-gray-100 py-16 px-6 md:px-12 border-t-4 border-black text-gray-700 text-center">
        <p class="text-[10px] font-black uppercase italic">© 2026 HEXA COMPUTRONICS KANPUR | BY AAMIR</p>
    </footer>

    <script>
        // ... Yahan aapka pura init() aur loadRows() wala JavaScript rahega ...
    </script>
</body>
</html>
