<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="canonical" href="https://hexacomputer.in/" />
    
    <link rel="icon" type="image/png" href="assets/newlogo.png">
    <link rel="apple-touch-icon" href="assets/newlogo.png">

    <meta name="google-site-verification" content="sOR1l6wNSIt1iPl4JaddWPU3UA196RdzAPdKPteixh8" />
    <title>Hexa Computronics | Best Refurbished Laptops & Desktops in Kanpur</title>
    <meta name="description" content="Hexa Computronics Kanpur offers premium certified refurbished business laptops and desktops. Buy Dell, HP, Lenovo at 70% off with EMI options in Kanpur.">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Hexa Computronics",
      "image": "https://hexacomputer.in/assets/newlogo.png",
      "@id": "https://hexacomputer.in",
      "url": "https://hexacomputer.in",
      "telephone": "+919935529306",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "119/540 New Basant Cinema Building",
        "addressLocality": "Kanpur",
        "postalCode": "208005",
        "addressCountry": "IN"
      },
      "priceRange": "₹₹",
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
        "opens": "10:00",
        "closes": "20:00"
      }
    }
    </script>

    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <style>
        :root { --red: #E50914; --bg: #ffffff; --card-bg: #f9f9f9; --text-dark: #1a1a1a; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Speed Fix: Font Display */
        * { font-display: swap; }

        .marquee-bar { background: linear-gradient(90deg, #831010, #E50914); color: white; padding: 10px 0; font-size: 11px; font-weight: 800; text-transform: uppercase; z-index: 1001; position: relative; }
        .marquee-content { display: inline-block; animation: marquee 25s linear infinite; white-space: nowrap; will-change: transform; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 3px solid #000; }
        .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 20px 0; scrollbar-width: none; -ms-overflow-style: none; }
        .netflix-row::-webkit-scrollbar { display: none; }

        .card { transition: 0.4s ease; min-width: 240px; background: #fff; border: 3px solid #000; border-radius: 4px; overflow: hidden; cursor: pointer; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 140px; object-fit: contain; background: #fff; padding: 12px; }

        .view-all-card { min-width: 180px; display: flex; align-items: center; justify-content: center; background: #000; color: #fff; border-radius: 4px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        @media (max-width: 768px) {
            header.relative { height: 40vh !important; }
            .card { min-width: 200px; }
            .hero-title { font-size: 2.2rem !important; }
        }
    </style>
</head>
<body>
    <script>
        let fullData = [];
        async function init() {
            try {
                const res = await fetch('data.json');
                fullData = await res.json();
                loadRows();
            } catch (e) { console.error("Data fail"); }
        }

        function loadRows() {
            // Speed Fix: Added Lazy Loading and Width/Height
            const createCard = (item) => `<div class="card" onclick="location.href='product-details.html?id=${item.id}'">
                <div class="relative"><img src="${item.images[0]}" alt="${item.model}" loading="lazy" width="240" height="140"><div class="absolute top-2 right-2 bg-red-600 text-white text-[7px] px-2 py-1 rounded font-black uppercase">EMI Available</div></div>
                <div class="p-3"><h3 class="font-black text-[10px] text-black truncate uppercase italic leading-tight">${item.model}</h3>
                <p class="text-[8px] text-gray-400 mt-1 uppercase font-black">${item.processor || 'Hardware'}</p>
                <div class="mt-2"><span class="text-sm font-black text-black italic">₹${item.price.toLocaleString()}</span></div></div></div>`;
            
            const viewAllCard = (link) => `<div class="view-all-card" onclick="location.href='${link}'">
                <span class="text-center p-4">VIEW ALL<br>CATALOG ▶</span>
            </div>`;

            const laptops = fullData.filter(i => i.category === "Laptop");
            const desktops = fullData.filter(i => i.category === "Desktop");
            const accessories = fullData.filter(i => i.category === "Accessories");

            // Load top 4 for Home (Best for Mobile Speed)
            document.getElementById('laptop-row').innerHTML = laptops.slice(0, 4).map(createCard).join('') + (laptops.length > 4 ? viewAllCard('laptops.html') : '');
            document.getElementById('desktop-row').innerHTML = desktops.slice(0, 4).map(createCard).join('') + (desktops.length > 4 ? viewAllCard('desktops.html') : '');
            document.getElementById('accessories-row').innerHTML = accessories.slice(0, 4).map(createCard).join('') + (accessories.length > 4 ? viewAllCard('accessories.html') : '');
        }
        window.onload = init;
    </script>
</body>
</html>
