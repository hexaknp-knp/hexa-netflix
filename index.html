<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Computronics | Premium Refurbished Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --deep-bg: #000000; --card-bg: #111; }
        body { background-color: var(--deep-bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .marquee-bar { background: linear-gradient(90deg, #003366, #0056b3); color: white; overflow: hidden; white-space: nowrap; padding: 10px 0; font-size: 11px; font-weight: 800; text-transform: uppercase; z-index: 1001; position: relative; }
        .marquee-content { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 25px 0; scrollbar-width: none; }
        .netflix-row::-webkit-scrollbar { display: none; }
        .card { transition: transform 0.4s ease; min-width: 280px; background: var(--card-bg); border-radius: 4px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.15); z-index: 50; border: 1px solid var(--gold); }
        .card img { width: 100%; height: 160px; object-fit: contain; background: #000; padding: 10px; }
        .section-label { font-size: 1.5rem; font-weight: 800; border-left: 5px solid var(--gold); padding-left: 15px; margin-top: 50px; text-transform: uppercase; }
        .hero-vignette { background: linear-gradient(to top, #000 10%, transparent 40%), linear-gradient(to right, #000 15%, transparent 70%); }
    </style>
</head>
<body>
    <div class="marquee-bar"><div class="marquee-content">⚡ SAME DAY DELIVERY IN KANPUR &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 💳 EASY EMI ON ALL BANK CARDS &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ⭐ CERTIFIED GRADE A STOCK</div></div>
    
    <nav id="navbar" class="fixed top-12 w-full z-[100] flex justify-between items-center px-6 md:px-12 py-3 transition-all duration-500">
        <div class="flex items-center space-x-10">
            <a href="index.html" class="flex flex-col items-center">
                <img src="assets/newlogo.png" class="h-12 logo-glow">
                <span class="text-[10px] text-yellow-500 font-black tracking-widest mt-2 uppercase">Hexa Computronics</span>
            </a>
            <div class="hidden lg:flex space-x-8 text-[11px] font-bold uppercase tracking-widest">
                <a href="index.html" class="text-white border-b-2 border-yellow-500">Home</a>
                <a href="laptops.html" class="text-gray-400 hover:text-white transition">Laptops</a>
                <a href="desktops.html" class="text-gray-400 hover:text-white transition">Desktops</a>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <i class="fas fa-search text-xl cursor-pointer"></i>
            <div class="w-8 h-8 bg-zinc-800 rounded-sm"></div>
        </div>
    </nav>

    <header class="relative h-[85vh] w-full bg-cover bg-center flex items-center px-6 md:px-12" style="background-image: url('https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=1600&q=80');">
        <div class="absolute inset-0 hero-vignette"></div>
        <div class="relative z-10 max-w-2xl mt-10">
            <h1 class="text-5xl md:text-7xl font-black mb-4 uppercase tracking-tighter leading-none italic"><span class="text-white">Premium</span><br><span class="text-yellow-500">Refurbished</span></h1>
            <p class="text-lg md:text-xl mb-8 text-gray-300 font-bold uppercase tracking-widest italic">Kanpur's Digital Tech Mall</p>
            <a href="laptops.html" class="inline-block bg-white text-black px-12 py-3 rounded font-black italic shadow-2xl hover:bg-yellow-500 transition">▶ BROWSE STORE</a>
        </div>
    </header>

    <main class="relative z-20 -mt-24 px-6 md:px-12 space-y-12 pb-20">
        <section><h2 class="section-label">Enterprise Laptops</h2><div id="laptop-row" class="netflix-row"></div></section>
        <section><h2 class="section-label">Business Desktops</h2><div id="desktop-row" class="netflix-row"></div></section>
    </main>

    <footer class="bg-black py-20 px-6 border-t border-zinc-900 text-center">
        <div class="flex justify-center space-x-10 text-2xl mb-8">
            <a href="https://youtube.com/@hexacomptech" style="color: #FF0000;"><i class="fab fa-youtube"></i></a>
            <a href="https://wa.me/919935529306" style="color: #25D366;"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p class="text-[10px] text-gray-600 tracking-[0.4em] uppercase font-bold">© 2026 HEXA COMPUTRONICS KANPUR | BY AAMIR</p>
    </footer>

    <script>
        let fullData = [];
        async function init() {
            try {
                const res = await fetch('data.json');
                fullData = await res.json();
                loadRows();
            } catch (err) { console.error("Error:", err); }
        }
        function loadRows() {
            const createCard = (item) => {
                const emi = Math.round((item.price * 1.18) / (item.emi_months || 12));
                return `<div class="card" onclick="location.href='product-details.html?id=${item.id}'">
                    <div class="relative"><img src="${item.image}"><div class="absolute top-2 right-2 bg-black/80 text-yellow-500 text-[8px] px-2 py-1 rounded font-bold uppercase">₹${emi}/MO*</div></div>
                    <div class="p-5">
                        <div class="flex gap-1 mb-2"><i class="fas fa-star text-yellow-500 text-[9px]"></i><i class="fas fa-star text-yellow-500 text-[9px]"></i><i class="fas fa-star text-yellow-500 text-[9px]"></i><i class="fas fa-star text-yellow-500 text-[9px]"></i><i class="fas fa-star text-yellow-500 text-[9px]"></i></div>
                        <h3 class="font-bold text-sm text-white truncate uppercase">${item.model}</h3>
                        <p class="text-[10px] text-gray-500 mt-1 uppercase">${item.processor} | ${item.ram}</p>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="text-base font-black text-white italic">₹${item.price.toLocaleString()}</span>
                            <span class="text-[7px] text-gray-600 italic uppercase">*Bank Int. Extra</span>
                        </div>
                    </div>
                </div>`;
            };
            document.getElementById('laptop-row').innerHTML = fullData.filter(i => i.category === "Laptop").map(createCard).join('');
            document.getElementById('desktop-row').innerHTML = fullData.filter(i => i.category === "Desktop").map(createCard).join('');
        }
        window.onload = init;
    </script>
</body>
</html>
