<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Computronics | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }
        .hero-vignette {
            background: linear-gradient(to top, #141414 5%, transparent 25%),
                        linear-gradient(to right, #141414 10%, transparent 50%);
        }
        .nav-black { background-color: #141414; transition: background 0.3s; }
    </style>
</head>
<body>

    <nav id="navbar" class="fixed top-0 w-full z-[100] flex justify-between px-10 py-4 transition-all duration-500">
        <div class="flex items-center space-x-8">
            <span class="text-red-600 font-extrabold text-3xl tracking-tighter">HEXA</span>
            <div class="hidden md:flex space-x-5 text-sm">
                <a href="index.html" class="font-bold">Home</a>
                <a href="laptops.html" class="hover:text-gray-300">Refurbished Laptops</a>
                <a href="https://hexacomputer.in/cctv" class="hover:text-gray-300">CCTV</a>
            </div>
        </div>
    </nav>

    <section class="relative h-[90vh] w-full bg-cover bg-center flex items-center px-12" 
             style="background-image: url('https://images.unsplash.com/photo-1541807084-5c52b6b3adef?w=1600');">
        <div class="absolute inset-0 hero-vignette"></div>
        <div class="relative z-10 max-w-2xl">
            <h1 class="text-7xl font-extrabold mb-4 uppercase tracking-tighter">Premium<br>Refurbished</h1>
            <p class="text-xl mb-6 text-gray-200">Kanpur's #1 IT Solution Hub. High-performance laptops at 60% less price. Tested, Certified, and ready to go.</p>
            <div class="flex space-x-4">
                <a href="laptops.html" class="bg-white text-black px-10 py-3 rounded font-bold hover:bg-opacity-80 transition text-lg">▶ Browse Laptops</a>
                <a href="https://hexacomputer.in/contact" class="bg-gray-500 bg-opacity-50 text-white px-10 py-3 rounded font-bold hover:bg-opacity-40 transition text-lg">ⓘ Contact Us</a>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('nav-black');
            else nav.classList.remove('nav-black');
        });
    </script>
</body>
</html>
