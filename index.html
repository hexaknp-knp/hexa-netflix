<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Computronics | Premium Refurbished Tech Mall Kanpur</title>
    <meta name="description" content="Hexa Computronics Kanpur offers premium refurbished business laptops, desktops, and accessories. Certified hardware with easy EMI.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; --card-bg: #f9f9f9; --text-dark: #1a1a1a; }
        body { background-color: var(--bg); color: var(--text-dark); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .marquee-bar { background: linear-gradient(90deg, #831010, #E50914); color: white; padding: 14px 0; font-size: 13px; font-weight: 800; text-transform: uppercase; z-index: 1001; position: relative; }
        .marquee-content { display: inline-block; animation: marquee 25s linear infinite; white-space: nowrap; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .offer-bar { background: #000; color: #fff; padding: 8px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; justify-content: center; gap: 20px; overflow: hidden; }
        .wiggle-text { color: #ffcc00; animation: wiggle 2s ease-in-out infinite; display: inline-block; }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        .netflix-row { display: flex; overflow-x: auto; gap: 15px; padding: 25px 0; scrollbar-width: none; }
        .netflix-row::-webkit-scrollbar { display: none; }
        .card { transition: transform 0.4s ease, box-shadow 0.4s ease; min-width: 280px; background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #eee; cursor: pointer; }
        .card:hover { transform: scale(1.05); border-color: var(--red); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 160px; object-fit: contain; background: #fff; padding: 15px; }
        .section-label { font-size: 1.5rem; font-weight: 800; border-left: 5px solid var(--red); padding-left: 15px; margin-top: 50px; text-transform: uppercase; font-style: italic; }
        #cartModal { display: none; position: fixed; inset: 0; z-index: 3000; }
        .cart-inner { position: absolute; right: 0; top: 0; height: 100%; width: 100%; max-w-md; background: white; padding: 30px; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.2); }
        #quoteModal, #searchModal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-inner { background: #fff; border: 2px solid var(--red); padding: 30px; border-radius: 10px; width: 100%; max-w-md; }
    </style>
</head>
<body>
    <div class="marquee-bar"><div class="marquee-content">⚡ SAME DAY DELIVERY IN KANPUR &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 💳 EASY EMI ON ALL BANK CARDS &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ⭐ 100% CERTIFIED BUSINESS HARDWARE</div></div>
    <div class="offer-bar"><span>🔥 <span class="wiggle-text">LIMITED TIME OFFER</span></span><span>⚠️ <span class="wiggle-text">LIMITED STOCK LEFT</span></span><span>💎 <span class="wiggle-text">LOWEST EMI GUARANTEED</span></span></div>

    <nav id="navbar" class="flex justify-between items-center px-6 md:px-12 py-4">
        <div class="flex items-center space-x-10">
            <a href="index.html" class="flex flex-col items-center">
                <img src="assets/newlogo.png" class="h-10">
                <span class="text-xl text-red-600 font-black tracking-[0.2em] mt-1 uppercase italic leading-none">Hexa Computronics</span>
            </a>
            <div class="hidden lg:flex space-x-8 text-[11px] font-bold uppercase tracking-widest">
                <a href="index.html" class="text-red-600 border-b-2 border-red-600">Home</a>
                <a href="laptops.html" class="text-gray-500 hover:text-black transition">Laptops</a>
                <a href="desktops.html" class="text-gray-500 hover:text-black transition">Desktops</a>
                <a href="accessories.html" class="text-gray-500 hover:text-black transition">Accessories</a>
            </div>
        </div>
        <div class="flex items-center space-x-6 text-2xl">
            <div class="relative cursor-pointer hover:text-red-600 transition" onclick="openCart()">
                <i class="fas fa-shopping-basket"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
            </div>
            <i class="fas fa-search cursor-pointer hover:text-red-600" onclick="openSearch()"></i>
            <button onclick="openQuote()" class="bg-red-600 text-white text-xs px-6 py-2 rounded font-black italic uppercase">Get Quote</button>
        </div>
    </nav>

    <div id="cartModal">
        <div class="absolute inset-0 bg-black/40" onclick="closeCart()"></div>
        <div class="cart-inner">
            <div class="flex justify-between items-center border-b pb-4 mb-6"><h2 class="text-xl font-black italic uppercase">Cart</h2><button onclick="closeCart()" class="text-3xl">&times;</button></div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
            <div class="border-t pt-6 mt-4">
                <div class="flex justify-between text-xl font-black italic mb-6"><span>TOTAL:</span><span id="cart-total" class="text-red-600">₹0</span></div>
                <button onclick="processCartPayment()" class="w-full bg-green-600 text-white py-4 rounded font-black italic uppercase tracking-widest hover:bg-black transition">PAY & ORDER VIA WHATSAPP</button>
            </div>
        </div>
    </div>

    <main class="px-6 md:px-12 space-y-12 pb-20">
        <section><h2 class="section-label italic">Enterprise Laptops</h2><div id="laptop-row" class="netflix-row"></div></section>
        <section><h2 class="section-label italic">Business Desktops</h2><div id="desktop-row" class="netflix-row"></div></section>
        <section><h2 class="section-label italic">Tech Accessories</h2><div id="accessories-row" class="netflix-row"></div></section>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        let fullData = [];
        let cart = JSON.parse(localStorage.getItem('hexaCart')) || [];

        function openCart() { document.getElementById('cartModal').style.display = 'block'; renderCart(); }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            document.getElementById('cart-count').innerText = cart.length;
            if(cart.length === 0) { container.innerHTML = `<p class="text-center py-20 text-gray-400">Empty!</p>`; totalEl.innerText = "₹0"; return; }
            let total = 0;
            container.innerHTML = cart.map((item, idx) => {
                total += item.price;
                return `<div class="flex items-center gap-4 border-b pb-4"><img src="${item.img}" class="w-16 h-16 object-contain border rounded"><div class="flex-1"><p class="text-xs font-black uppercase italic">${item.name}</p><p class="font-bold text-red-600">₹${item.price.toLocaleString()}</p></div><button onclick="removeFromCart(${idx})" class="text-gray-300 hover:text-red-600"><i class="fas fa-trash-alt"></i></button></div>`;
            }).join('');
            totalEl.innerText = `₹${total.toLocaleString()}`;
        }

        function removeFromCart(idx) { cart.splice(idx, 1); localStorage.setItem('hexaCart', JSON.stringify(cart)); renderCart(); }

        function processCartPayment() {
            if (cart.length === 0) return;
            let total = cart.reduce((s, i) => s + i.price, 0);
            let summary = cart.map(i => i.name).join(', ');
            new Razorpay({
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": total * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": summary,
                "handler": function(res) {
                    let msg = `*PAYMENT SUCCESSFUL*%0A*Items:* ${summary}%0A*Total:* ₹${total.toLocaleString()}%0A*PayID:* ${res.razorpay_payment_id}`;
                    cart = []; localStorage.setItem('hexaCart', JSON.stringify(cart));
                    window.open(`https://wa.me/919935529306?text=${msg}`, '_blank');
                    window.location.href = "success.html";
                },
                "theme": { "color": "#E50914" }
            }).open();
        }

        async function init() {
            const res = await fetch('data.json');
            fullData = await res.json();
            loadRows();
            renderCart();
        }

        function loadRows() {
            const createCard = (i) => `<div class="card" onclick="location.href='product-details.html?id=${i.id}'"><img src="${i.images[0]}" loading="lazy"><div class="p-5"><h3 class="font-bold text-sm truncate uppercase italic">${i.model}</h3><div class="mt-4 flex justify-between items-center"><span class="text-base font-black italic text-black">₹${i.price.toLocaleString()}</span><span class="text-[8px] text-gray-400 uppercase">Certified</span></div></div></div>`;
            document.getElementById('laptop-row').innerHTML = fullData.filter(i => i.category === "Laptop").map(createCard).join('');
            document.getElementById('desktop-row').innerHTML = fullData.filter(i => i.category === "Desktop").map(createCard).join('');
            document.getElementById('accessories-row').innerHTML = fullData.filter(i => i.category === "Accessories").map(createCard).join('');
        }
        window.onload = init;
    </script>
</body>
</html>
