<script>
    let fullData = [];
    async function init() { 
        const response = await fetch('data.json'); 
        fullData = await response.json(); 
        loadRows(); 
    }
    function loadRows() {
        const createCard = (item) => {
            const months = item.emi_months || 12;
            const emi = Math.round((item.price * 1.18) / months);
            return `
            <div class="card" onclick="location.href='product-details.html?id=${item.id}'">
                <div class="relative">
                    <img src="${item.image}" alt="${item.model}">
                    <div class="absolute top-2 right-2 bg-black/80 text-yellow-500 text-[8px] px-2 py-1 rounded font-bold uppercase">
                        EMI FROM ₹${emi}*
                    </div>
                </div>
                <div class="p-5">
                    <div class="flex gap-1 mb-2"><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i></div>
                    <p class="text-[10px] font-black text-yellow-500 tracking-widest uppercase mb-1">${item.brand}</p>
                    <h3 class="font-bold text-sm uppercase text-white truncate">${item.model}</h3>
                    <p class="text-[10px] text-gray-400 mt-2 uppercase">${item.processor} | ${item.ram} | ${item.ssd}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-base font-black text-white italic">₹${item.price.toLocaleString()}</span>
                        <span class="text-[7px] text-gray-500 italic uppercase">*Bank Int. Extra</span>
                    </div>
                </div>
            </div>`;
        };
        document.getElementById('laptop-row').innerHTML = fullData.filter(i => i.category === "Laptop").slice(0,10).map(createCard).join('');
        document.getElementById('desktop-row').innerHTML = fullData.filter(i => i.category === "Desktop").slice(0,10).map(createCard).join('');
    }
    init();
</script>
