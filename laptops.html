<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Enterprise Laptops | Hexa Store Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; --text-dark: #1a1a1a; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-dark); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.7) 10%, rgba(255,255,255,0.3)),
                url('https://images.pexels.com/photos/18105/pexels-photo.jpg?auto=compress&cs=tinysrgb&w=1600');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        .page-vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(255,255,255,0.9) 100%); z-index: -1; pointer-events: none; }

        .marquee-bar { background: linear-gradient(90deg, #831010, #E50914); color: white; padding: 10px 0; font-size: 11px; font-weight: 800; text-transform: uppercase; z-index: 1001; position: relative; }
        .marquee-content { display: inline-block; animation: marquee 25s linear infinite; white-space: nowrap; will-change: transform; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #navbar { position: sticky; top: 0; width: 100%; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 3px solid #000; }

        /* Optimized Grid: 2 Cards on Mobile, 4 on Desktop */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 30px; padding: 50px; } }

        /* Card Styling - Compact for Mobile */
        .netflix-card { transition: 0.4s ease; border: 2px solid #000; border-radius: 4px; background: #fff; overflow: hidden; box-shadow: 5px 5px 0px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .netflix-card:hover { transform: translateY(-5px); border-color: var(--red); box-shadow: 8px 8px 0px rgba(229, 9, 20, 0.1); }
        .netflix-card img { width: 100%; height: 120px; object-fit: contain; padding: 10px; background: white; border-bottom: 1px solid #eee; }
        @media (min-width: 1024px) { .netflix-card img { height: 200px; padding: 20px; } .netflix-card { border-width: 3px; box-shadow: 10px 10px 0px rgba(0,0,0,0.1); } }

        #quoteModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(8px); }
        .modal-inner { background: #fff; border: 3px solid var(--red); padding: 25px; border-radius: 4px; width: 100%; max-width: 400px; box-shadow: 20px 20px 0px rgba(0,0,0,0.2); }
        
        input, textarea { font-size: 16px !important; }

        @media (max-width: 768px) {
            header { padding: 2rem 1rem !important; }
            h1 { font-size: 2.5rem !important; }
            .card-content { padding: 10px !important; }
            .card-title { font-size: 12px !important; }
            .card-price { font-size: 16px !important; }
            .card-btn { padding: 8px !important; font-size: 10px !important; margin-top: 10px !important; }
        }
    </style>
</head>
<body>

    <div class="page-vignette"></div>
    <div class="marquee-bar">
        <div class="marquee-content">⚡ SAME DAY DELIVERY IN KANPUR &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 💳 EASY EMI ON ALL BANK CARDS &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ⭐ 100% CERTIFIED BUSINESS HARDWARE</div>
    </div>

    <nav id="navbar" class="flex justify-between items-center px-4 md:px-12 py-3">
        <a href="index.html" class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Hexa Logo" class="h-8">
            <span class="text-xs text-red-600 font-black tracking-widest uppercase italic">Hexa Computronics</span>
        </a>
        <div class="flex items-center space-x-3">
             <button onclick="openQuote()" class="bg-red-600 text-white text-[10px] px-4 py-2 rounded font-black italic uppercase">Get Quote</button>
        </div>
    </nav>

    <div id="quoteModal">
        <div class="modal-inner">
            <div class="flex justify-between items-center mb-6 border-b-2 border-black pb-4">
                <h2 class="text-xl font-black text-black italic uppercase">Inquiry</h2>
                <button onclick="closeQuote()" class="text-gray-400 hover:text-red-600 text-2xl font-black">×</button>
            </div>
            <form class="space-y-4">
                <input type="text" id="qName" placeholder="NAME" class="w-full border-2 border-black p-3 font-black outline-none focus:border-red-600" required>
                <input type="tel" id="qPhone" placeholder="WHATSAPP" class="w-full border-2 border-black p-3 font-black outline-none focus:border-red-600" required>
                <textarea id="qReq" placeholder="REQUIREMENT..." class="w-full border-2 border-black p-3 font-black h-24 outline-none focus:border-red-600" required></textarea>
                <button type="button" onclick="sendToWA()" class="w-full bg-black text-white font-black py-4 rounded uppercase italic hover:bg-red-600 transition-all">Submit</button>
            </form>
        </div>
    </div>

    <header class="py-10 px-6 text-center md:text-left">
        <h1 class="text-5xl md:text-8xl font-black uppercase italic leading-none text-black">Enterprise <br><span class="text-red-600">Laptops</span></h1>
        <div class="h-1 w-20 bg-red-600 mt-4 mx-auto md:mx-0"></div>
    </header>

    <div id="product-container" class="product-grid relative z-10"></div>

    <footer class="bg-gray-100 py-10 px-6 border-t-4 border-black text-center">
        <p class="text-[9px] font-black text-black uppercase italic">© 2026 HEXA COMPUTRONICS KANPUR | BY AAMIR</p>
    </footer>

    <script>
        let allLaptops = [];
        function openQuote() { document.getElementById('quoteModal').style.display = 'flex'; }
        function closeQuote() { document.getElementById('quoteModal').style.display = 'none'; }
        
        function sendToWA() {
            const name = document.getElementById('qName').value;
            const phone = document.getElementById('qPhone').value;
            const req = document.getElementById('qReq').value;
            if(!name || !phone || !req) { alert("Please fill details!"); return; }
            window.open(`https://wa.me/919935529306?text=*HEXA INQUIRY*%0A*Name:* ${name}%0A*Req:* ${req}`, '_blank');
        }

        async function fetchLaptops() {
            const res = await fetch('data.json');
            const data = await res.json();
            allLaptops = data.filter(item => item.category === "Laptop").sort((a,b) => a.price - b.price);
            render(allLaptops);
        }

        function render(data) {
            document.getElementById('product-container').innerHTML = data.map(item => {
                const emi = Math.round((item.price * 1.15) / (item.emi_months || 12));
                return `
                <div class="netflix-card">
                    <div class="relative">
                        <img src="${item.images[0]}" alt="${item.model}" loading="lazy">
                        <div class="absolute top-1 right-1 bg-red-600 text-white text-[7px] px-1 py-0.5 rounded-sm font-black uppercase">₹${emi}/mo</div>
                    </div>
                    <div class="card-content p-4 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="card-title font-black text-black uppercase truncate italic text-xs">${item.model}</h3>
                            <p class="text-[8px] text-gray-500 font-black uppercase mt-1">${item.processor.split(' ')[0]} • ${item.ram}</p>
                        </div>
                        <div class="mt-3">
                            <p class="card-price text-xl font-black text-black italic leading-none">₹${item.price.toLocaleString()}</p>
                            <a href="product-details.html?id=${item.id}" class="card-btn block w-full mt-3 bg-black text-white py-2 rounded font-black text-center text-[9px] uppercase tracking-widest hover:bg-red-600 italic">▶ View</a>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
        fetchLaptops();
    </script>
</body>
</html>
