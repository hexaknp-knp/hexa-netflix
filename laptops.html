<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Laptops | Hexa Store Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --deep-bg: #0a0c10; --card-bg: #161b22; }
        body { background-color: var(--deep-bg); color: white; font-family: 'Inter', sans-serif; }
        .netflix-card { transition: all 0.4s ease; background: var(--card-bg); border: 1px solid #222; border-radius: 12px; overflow: hidden; }
        .netflix-card:hover { transform: scale(1.05); border-color: var(--gold); z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .netflix-card img { width: 100%; height: 200px; object-fit: contain; background: #000; padding: 15px; }
        .star-gold { color: var(--gold); font-size: 10px; }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full z-[100] bg-black/90 backdrop-blur-md border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center space-x-3">
            <img src="assets/newlogo.png" alt="Logo" class="h-10">
            <span class="text-yellow-500 font-black text-lg tracking-tighter">HEXA</span>
        </a>
        <div class="flex items-center space-x-6">
            <input type="text" id="searchInput" placeholder="Search i5, Dell..." class="bg-zinc-900 border border-zinc-700 text-xs px-4 py-2 rounded-full outline-none focus:border-yellow-500 w-64">
            <a href="index.html" class="text-xs font-bold hover:text-yellow-500 uppercase">Home</a>
        </div>
    </nav>

    <header class="pt-32 pb-10 px-6 md:px-12">
        <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter italic text-glow">Enterprise <span class="text-yellow-500">Laptops</span></h1>
        <p class="text-gray-500 text-sm mt-3 font-bold uppercase tracking-widest">Certified Grade-A Inventory Kanpur</p>
    </header>

    <main class="px-6 md:px-12 py-10">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <script>
        let allLaptops = [];
        async function fetchLaptops() {
            const response = await fetch('data.json');
            const data = await response.json();
            allLaptops = data.filter(item => item.category === "Laptop").sort((a,b) => a.price - b.price);
            renderLaptops(allLaptops);
        }
        function renderLaptops(data) {
            document.getElementById('product-container').innerHTML = data.map(item => `
                <div class="netflix-card shadow-2xl">
                    <img src="${item.image}" alt="${item.model}">
                    <div class="p-6">
                        <div class="flex gap-1 mb-2"><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i></div>
                        <h3 class="text-lg font-black text-white uppercase truncate">${item.model}</h3>
                        <p class="text-[10px] text-gray-400 mt-2 uppercase border-b border-zinc-800 pb-3">${item.processor} | ${item.ram} | ${item.ssd}</p>
                        <div class="mt-5 flex justify-between items-center">
                            <span class="text-2xl font-black text-white italic">₹${item.price.toLocaleString()}</span>
                            <span class="text-[10px] text-blue-400 font-bold">EMI STARTING</span>
                        </div>
                        <a href="product-details.html?id=${item.id}" class="block w-full mt-6 bg-yellow-500 text-black py-4 rounded-xl font-black uppercase text-[10px] text-center tracking-widest hover:bg-white transition-all">VIEW DETAILS</a>
                    </div>
                </div>`).join('');
        }
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            renderLaptops(allLaptops.filter(l => l.model.toLowerCase().includes(val) || l.brand.toLowerCase().includes(val) || l.processor.toLowerCase().includes(val)));
        });
        fetchLaptops();
    </script>
</body>
</html>
