<script>
    function renderLaptops(data) {
        document.getElementById('product-container').innerHTML = data.map(item => {
            const months = item.emi_months || 12;
            const emi = Math.round((item.price * 1.18) / months);
            return `
            <div class="netflix-card shadow-2xl">
                <div class="relative">
                    <img src="${item.image}" alt="${item.model}">
                    <div class="absolute top-3 right-3 bg-yellow-500 text-black text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-tighter">
                        ₹${emi}/MO*
                    </div>
                </div>
                <div class="p-6">
                    <div class="flex gap-1 mb-2"><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i></div>
                    <h3 class="text-lg font-black text-white uppercase truncate">${item.model}</h3>
                    <p class="text-[10px] text-gray-400 mt-2 uppercase border-b border-zinc-800 pb-3">${item.processor} | ${item.ram} | ${item.ssd}</p>
                    <div class="mt-5 flex justify-between items-center">
                        <span class="text-2xl font-black text-white italic">₹${item.price.toLocaleString()}</span>
                        <span class="text-[8px] text-gray-600 uppercase italic">*Interest as per bank</span>
                    </div>
                    <a href="product-details.html?id=${item.id}" class="block w-full mt-6 bg-yellow-500 text-black py-4 rounded-xl font-black uppercase text-[10px] text-center tracking-widest">VIEW DETAILS</a>
                </div>
            </div>`;
        }).join('');
    }
</script>
