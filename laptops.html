<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Laptops | Hexa Computronics Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #FFD700; --deep-bg: #0a0c10; --card-bg: #161b22; }
        body { background-color: var(--deep-bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Netflix Card Style */
        .netflix-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            background: var(--card-bg); 
            border: 1px solid #222; 
            border-radius: 12px;
            overflow: hidden;
        }
        .netflix-card:hover { 
            transform: scale(1.05); 
            border-color: var(--gold); 
            z-index: 10; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Image Alignment Fix (Sabhi laptops ke liye same size) */
        .netflix-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: contain; /* Isse image stretch nahi hogi */
            background: #000;
            padding: 15px;
            transition: transform 0.5s ease;
        }
        .netflix-card:hover img { transform: scale(1.08); }

        .gold-glow { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.3)); }
        .star-gold { color: var(--gold); font-size: 10px; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0c10; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] bg-black/90 backdrop-blur-md border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center space-x-3">
            <img src="assets/newlogo.png" alt="Logo" class="h-10 gold-glow">
            <div class="leading-none">
                <span class="block text-yellow-500 font-black text-lg tracking-tighter">HEXA</span>
                <span class="text-[8px] text-gray-400 tracking-[0.3em] uppercase">Computronics</span>
            </div>
        </a>
        <div class="flex items-center space-x-6">
            <div class="relative hidden md:block">
                <input type="text" id="searchInput" placeholder="Search Laptop (e.g. i5, Dell)..." 
                       class="bg-zinc-900 border border-zinc-700 text-xs px-10 py-2.5 rounded-full outline-none focus:border-yellow-500 w-72 transition-all">
                <i class="fas fa-search absolute left-4 top-3 text-gray-500 text-[10px]"></i>
            </div>
            <a href="index.html" class="text-xs font-bold hover:text-yellow-500 transition uppercase tracking-widest">Home</a>
        </div>
    </nav>

    <header class="pt-32 pb-10 px-6 md:px-12 border-b border-zinc-900 bg-gradient-to-b from-zinc-900/20 to-transparent">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter italic">
                    Enterprise <span class="text-yellow-500">Laptops</span>
                </h1>
                <p class="text-gray-500 text-sm mt-3 max-w-xl font-medium">
                    Kanpur's Premium Inventory: Grade-A Certified Business Machines with Testing Warranty & Pan-India Shipping.
                </p>
            </div>
            <div class="flex gap-4 text-[10px] font-black uppercase tracking-widest text-gray-400">
                <span class="flex items-center gap-2"><i class="fas fa-check-circle text-green-500"></i> Quality Tested</span>
                <span class="flex items-center gap-2"><i class="fas fa-truck text-blue-500"></i> Fast Delivery</span>
            </div>
        </div>
    </header>

    <main class="px-6 md:px-12 py-12">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full py-20 text-center">
                <i class="fas fa-circle-notch fa-spin text-3xl text-yellow-500 mb-4"></i>
                <p class="text-gray-500 uppercase font-black tracking-widest text-xs">Fetching Best Deals...</p>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-zinc-900 text-[10px] text-gray-600 font-bold tracking-[0.3em] uppercase">
        © 2026 HEXA COMPUTRONICS KANPUR | BY AAMIR
    </footer>

    <script>
        let allLaptops = [];

        async function fetchLaptops() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                // Laptop Filter aur Price Low to High Sort
                allLaptops = data.filter(item => item.category === "Laptop").sort((a,b) => a.price - b.price);
                renderLaptops(allLaptops);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('product-container').innerHTML = "<div class='col-span-full text-center text-red-500'>Error loading inventory. Check data.json connection.</div>";
            }
        }

        function renderLaptops(data) {
            const container = document.getElementById('product-container');
            if(data.length === 0) {
                container.innerHTML = "<div class='col-span-full py-20 text-center text-gray-500 uppercase font-bold'>No matching laptops found.</div>";
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="netflix-card shadow-2xl">
                    <div class="relative">
                        <img src="${item.image}" alt="${item.model} Kanpur" onerror="this.src='https://via.placeholder.com/400x300?text=Hexa+Tech'">
                        <div class="absolute top-3 right-3 bg-yellow-500 text-black text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-tighter shadow-lg">
                            EMI STARTING ₹${Math.round((item.price * 1.18)/12)}
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <div class="flex gap-1 mb-3">
                            <i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i><i class="fas fa-star star-gold"></i>
                            <span class="text-[8px] text-gray-500 font-bold ml-1 tracking-tighter uppercase">(4.9/5)</span>
                        </div>

                        <h3 class="text-lg font-black tracking-tight text-white uppercase truncate">${item.model}</h3>
                        
                        <p class="text-[10px] text-gray-400 mt-2 font-bold uppercase tracking-wider border-b border-zinc-800 pb-3">
                            ${item.processor} | ${item.ram} | ${item.ssd}
                        </p>
                        
                        <div class="mt-5 flex justify-between items-center">
                            <div>
                                <span class="block text-[8px] text-gray-500 uppercase font-black tracking-widest">Store Price</span>
                                <span class="text-2xl font-black text-white italic">₹${item.price.toLocaleString()}</span>
                            </div>
                            <div class="text-right">
                                <span class="block text-[8px] text-blue-400 font-black uppercase tracking-widest">Warranty</span>
                                <span class="text-[10px] font-bold text-white uppercase">Certified</span>
                            </div>
                        </div>

                        <a href="product-details.html?id=${item.id}" 
                           class="block w-full mt-6 bg-yellow-500 text-black py-4 rounded-xl font-black uppercase text-[10px] text-center tracking-[0.2em] hover:bg-white transition-all transform hover:-translate-y-1 shadow-xl">
                            VIEW DETAILS <i class="fas fa-arrow-right ml-2"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // Real-time Mall Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allLaptops.filter(l => 
                l.model.toLowerCase().includes(val) || 
                l.brand.toLowerCase().includes(val) || 
                l.processor.toLowerCase().includes(val)
            );
            renderLaptops(filtered);
        });

        fetchLaptops();
    </script>
</body>
</html>
