<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Laptops | Hexa Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; }
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .netflix-card { transition: transform 0.4s ease; border: 1px solid #222; border-radius: 4px; background: #141414; overflow: hidden; }
        .netflix-card:hover { transform: scale(1.05); border-color: var(--red); z-index: 10; }
        .netflix-card img { width: 100%; height: 180px; object-fit: contain; padding: 15px; }
    </style>
</head>
<body class="pt-32 px-6">
    <nav class="fixed top-0 left-0 w-full bg-black/95 p-4 border-b border-zinc-800 flex justify-between items-center z-[100] px-6 md:px-12">
        <a href="index.html" class="flex flex-col items-center">
            <img src="assets/newlogo.png" class="h-10">
            <span class="text-[18px] text-red-600 font-black tracking-[0.4em] mt-1 uppercase italic leading-none">Hexa Computronics</span>
        </a>
        <input type="text" id="searchInput" placeholder="Search..." class="bg-zinc-900 text-xs px-4 py-2 rounded-full border border-zinc-700 outline-none w-64 focus:border-red-600">
    </nav>
    <header class="py-10 md:px-6"><h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter">Enterprise <span class="text-red-600">Laptops</span></h1></header>
    <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 pb-20 md:px-6"></div>
    <script>
        let allLaptops = [];
        async function fetchLaptops() {
            const res = await fetch('data.json');
            const data = await res.json();
            allLaptops = data.filter(item => item.category === "Laptop").sort((a,b) => a.price - b.price);
            render(allLaptops);
        }
        function render(data) {
            document.getElementById('product-container').innerHTML = data.map(item => {
                const emi = Math.round((item.price * 1.18) / (item.emi_months || 12));
                return `<div class="netflix-card">
                    <div class="relative"><img src="${item.images[0]}"><div class="absolute top-2 right-2 bg-red-600 text-white text-[9px] px-2 py-1 rounded-sm font-black shadow-lg">₹${emi}/MO*</div></div>
                    <div class="p-6">
                        <div class="flex gap-1 mb-2"><i class="fas fa-star text-red-600 text-[8px]"></i><i class="fas fa-star text-red-600 text-[8px]"></i><i class="fas fa-star text-red-600 text-[8px]"></i><i class="fas fa-star text-red-600 text-[8px]"></i><i class="fas fa-star text-red-600 text-[8px]"></i></div>
                        <h3 class="font-bold text-white uppercase truncate italic">${item.model}</h3>
                        <p class="text-[10px] text-gray-500 mt-2 font-bold uppercase">${item.processor} | ${item.ram}</p>
                        <div class="mt-4 flex justify-between items-center"><span class="text-xl font-black text-white italic">₹${item.price.toLocaleString()}</span><span class="text-[8px] text-zinc-600 uppercase font-black">${item.warranty || 'Certified'}</span></div>
                        <a href="product-details.html?id=${item.id}" class="block w-full mt-6 bg-red-600 text-white py-3 rounded font-black text-center text-[10px] uppercase">View Details</a>
                    </div>
                </div>`;
            }).join('');
        }
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(allLaptops.filter(l => l.model.toLowerCase().includes(val)));
        });
        fetchLaptops();
    </script>
</body>
</html>
