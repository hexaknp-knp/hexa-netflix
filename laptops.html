<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Laptops | Hexa Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .netflix-card { transition: transform 0.3s ease; border: 1px solid #222; border-radius: 4px; overflow: hidden; background: #111; }
        .netflix-card:hover { transform: scale(1.05); border-color: #FFD700; z-index: 10; }
        .netflix-card img { width: 100%; height: 180px; object-fit: contain; background: #000; padding: 15px; }
    </style>
</head>
<body class="pt-24 px-6">
    <nav class="fixed top-0 left-0 w-full bg-black/90 p-4 border-b border-zinc-800 flex justify-between items-center z-[100]">
        <a href="index.html" class="flex items-center space-x-2"><img src="assets/newlogo.png" class="h-8"><span class="text-yellow-500 font-black">HEXA</span></a>
        <input type="text" id="searchInput" placeholder="Search i5, Dell..." class="bg-zinc-900 text-xs px-4 py-1.5 rounded-full border border-zinc-700 outline-none w-64">
    </nav>
    <header class="py-10"><h1 class="text-4xl font-black uppercase italic">Enterprise <span class="text-yellow-500">Laptops</span></h1></header>
    <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 pb-20"></div>

    <script>
        let allLaptops = [];
        async function fetchLaptops() {
            const res = await fetch('data.json');
            const data = await res.json();
            allLaptops = data.filter(item => item.category === "Laptop").sort((a,b) => a.price - b.price);
            render(allLaptops);
        }
        function render(data) {
            document.getElementById('product-container').innerHTML = data.map(item => `
                <div class="netflix-card">
                    <img src="${item.image}">
                    <div class="p-5">
                        <div class="flex gap-1 mb-2"><i class="fas fa-star text-yellow-500 text-[8px]"></i><i class="fas fa-star text-yellow-500 text-[8px]"></i><i class="fas fa-star text-yellow-500 text-[8px]"></i><i class="fas fa-star text-yellow-500 text-[8px]"></i><i class="fas fa-star text-yellow-500 text-[8px]"></i></div>
                        <h3 class="font-bold text-white uppercase truncate">${item.model}</h3>
                        <p class="text-[10px] text-gray-500 mt-2 uppercase">${item.processor} | ${item.ram} | ${item.ssd}</p>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="text-xl font-black text-white italic">₹${item.price.toLocaleString()}</span>
                            <span class="text-[8px] text-gray-600 uppercase italic">*Bank Int. extra</span>
                        </div>
                        <a href="product-details.html?id=${item.id}" class="block w-full mt-4 bg-yellow-500 text-black py-2 rounded font-black text-center text-xs uppercase">View Details</a>
                    </div>
                </div>`).join('');
        }
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(allLaptops.filter(l => l.model.toLowerCase().includes(val) || l.brand.toLowerCase().includes(val)));
        });
        fetchLaptops();
    </script>
</body>
</html>
