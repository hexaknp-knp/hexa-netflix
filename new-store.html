<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand New Store | Hexa Computronics Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --paytm-blue: #00BAF2; --hexa-red: #E50914; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; }
        .new-card { transition: 0.3s; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .new-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--paytm-blue); }
    </style>
</head>
<body>

    <header class="bg-white border-b-2 border-black py-6 px-6 text-center">
        <h1 class="text-3xl font-black italic uppercase italic">Brand <span class="text-green-600">New</span> Store</h1>
        <p class="text-[10px] font-bold text-gray-500 tracking-[0.3em] uppercase mt-1">Authorized Company Warranty & PayTM Cashback</p>
    </header>

    <div class="bg-[#00BAF2] text-white py-3 px-4 text-center font-black uppercase italic text-xs sticky top-0 z-50">
        🚀 Flat Cashback & Easy EMI via <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/Paytm_Logo.png" class="h-4 inline-block ml-1 brightness-0 invert"> | Back to School Deals Live!
    </div>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div id="new-items-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        async function loadNewStore() {
            const res = await fetch('data.json');
            const data = await res.json();
            const newProducts = data.filter(item => item.condition === "New");
            
            const grid = document.getElementById('new-items-grid');
            grid.innerHTML = newProducts.map(item => `
                <div class="new-card">
                    <div class="relative">
                        <img src="${item.images[0]}" class="w-full h-48 object-contain p-6">
                        <div class="absolute top-3 left-3 bg-green-600 text-white text-[9px] px-2 py-1 rounded font-black">NEW ARRIVAL</div>
                    </div>
                    <div class="p-5 border-t border-gray-100">
                        <span class="text-[10px] font-black text-blue-600 uppercase">${item.brand} Official</span>
                        <h2 class="text-lg font-black text-black leading-tight mt-1 uppercase italic">${item.model}</h2>
                        <p class="text-xs font-bold text-gray-600 mt-2">${item.processor}</p>
                        
                        <div class="mt-4 bg-blue-50 p-2 border border-blue-100 rounded">
                            <p class="text-[9px] font-black text-blue-700 uppercase">PayTM Offer:</p>
                            <p class="text-[11px] font-black text-black">${item.offer_label}</p>
                        </div>

                        <div class="mt-5 flex justify-between items-end">
                            <div>
                                <p class="text-[10px] font-bold text-gray-400 uppercase">M.R.P Price</p>
                                <p class="text-2xl font-black text-black">₹${item.price.toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-black text-red-600 leading-none">EMI STARTS AT</p>
                                <p class="text-sm font-black text-black leading-none">₹${item.emi_amount}/mo*</p>
                            </div>
                        </div>

                        <button onclick="window.open('https://paytm.com', '_blank')" class="w-full mt-6 bg-black text-white py-3 font-black uppercase italic text-sm hover:bg-blue-600 transition-colors">
                            Buy via PayTM Cashback ▶
                        </button>
                        <p class="text-[8px] text-center text-gray-400 mt-2 font-bold uppercase">*T&C Apply | 12 Months EMI Available</p>
                    </div>
                </div>
            `).join('');
        }
        window.onload = loadNewStore;
    </script>

</body>
</html>
