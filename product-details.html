<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Hexa Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .buy-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 30px; }
        #product-img { width: 100%; height: 400px; object-fit: contain; background: #000; border: 1px solid #222; border-radius: 8px; }
    </style>
</head>
<body class="pt-24 px-6 md:px-20">
    <div id="product-content" class="max-w-6xl mx-auto pb-20"></div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data.json');
            const data = await res.json();
            const item = data.find(p => p.id === id);
            if (!item) return;

            const basePrice = item.price;
            const gst = Math.round(basePrice * 0.18);
            const shipping = item.shipping || 0;
            const netTotal = basePrice + gst + shipping;
            const months = item.emi_months || 12;
            
            // 15% Approx Bank Interest calculation for display
            const emiWithInterest = Math.round((netTotal * 1.15) / months);

            document.getElementById('product-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-12">
                    <img id="product-img" src="${item.image}">
                    <div class="buy-card">
                        <h1 class="text-4xl font-black uppercase italic italic">${item.model}</h1>
                        <p class="text-gray-400 mt-2 uppercase font-black text-xs tracking-widest">${item.processor} | ${item.ram} | ${item.ssd}</p>
                        
                        <div class="mt-10 space-y-4 border-t border-zinc-800 pt-8">
                            <div class="flex justify-between text-xs text-zinc-500 uppercase font-black"><span>Base Price</span><span>₹${basePrice.toLocaleString()}</span></div>
                            <div class="flex justify-between text-xs text-zinc-500 uppercase font-black"><span>GST (18%)</span><span>+ ₹${gst.toLocaleString()}</span></div>
                            <div class="flex justify-between text-xs text-zinc-500 uppercase font-black border-b border-zinc-800 pb-4"><span>Shipping</span><span>${shipping === 0 ? 'FREE' : '₹' + shipping}</span></div>
                            
                            <div class="flex justify-between items-center bg-blue-900/10 p-6 rounded-xl border border-blue-500/20">
                                <div><p class="text-[10px] text-blue-400 font-black uppercase tracking-widest italic">Approx EMI starts from</p><p class="text-4xl font-black italic text-yellow-500">₹${emiWithInterest.toLocaleString()}/mo*</p></div>
                                <div class="text-right text-[10px] text-gray-500 uppercase font-bold italic">${months} Months</div>
                            </div>
                            <p class="text-[9px] text-gray-600 uppercase font-black tracking-widest italic">
                                *Disclaimer: 14%-16% interest rate varies by bank (Credit/Debit Card EMI). Final amount will be calculated on payment page.
                            </p>
                        </div>

                        <button onclick="payNow('${item.model}', ${netTotal})" class="w-full bg-red-600 text-white py-5 rounded font-black uppercase text-xl mt-8 shadow-xl hover:bg-white hover:text-black transition-all">Buy Now: ₹${netTotal.toLocaleString()}</button>
                    </div>
                </div>`;
        }
        function payNow(name, amount) {
            new Razorpay({
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": amount * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": name,
                "handler": function(res) { window.location.href="success.html"; },
                "theme": { "color": "#E50914" }
            }).open();
        }
        load();
    </script>
</body>
</html>
