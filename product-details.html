<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details | Hexa Computronics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .gold-text { color: #FFD700; }
        .bg-zinc-card { background: #111; border: 1px solid #222; }
    </style>
</head>
<body class="pt-24 px-6 md:px-20">

    <div id="product-content" class="max-w-6xl mx-auto py-10">
        <p class="animate-pulse">Loading Product Details...</p>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            const response = await fetch('data.json');
            const data = await response.json();
            const item = data.find(p => p.id === productId);

            if (!item) {
                document.getElementById('product-content').innerHTML = "Product Not Found!";
                return;
            }

            // Calculations
            const basePrice = item.price;
            const gst = Math.round(basePrice * 0.18);
            const shipping = 0; // Yahan se aap shipping change kar sakte hain
            const total = basePrice + gst + shipping;

            document.getElementById('product-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-12">
                    <img src="${item.image}" class="rounded-2xl border border-zinc-800 w-full shadow-2xl">
                    <div class="space-y-6">
                        <h1 class="text-4xl font-black uppercase tracking-tighter">${item.model}</h1>
                        <p class="text-gray-400 font-bold">${item.processor} | ${item.ram} | ${item.ssd}</p>
                        
                        <div class="bg-zinc-card p-6 rounded-xl space-y-4 border-l-4 border-yellow-500">
                            <div class="flex justify-between text-sm">
                                <span>Ex-GST Price:</span>
                                <span>₹${basePrice.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between text-sm text-gray-400">
                                <span>GST (18%):</span>
                                <span>+ ₹${gst.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between text-sm text-gray-400 border-b border-zinc-800 pb-3">
                                <span>Shipping / Freight:</span>
                                <span class="text-green-500 font-bold">${shipping === 0 ? 'FREE' : '₹' + shipping}</span>
                            </div>
                            <div class="flex justify-between text-2xl font-black gold-text pt-2">
                                <span>Total Price:</span>
                                <span>₹${total.toLocaleString()}</span>
                            </div>
                        </div>

                        <div class="p-4 bg-blue-900/20 border border-blue-500/30 rounded-lg">
                            <p class="text-xs font-bold text-blue-400 uppercase">Special EMI Offer</p>
                            <p class="text-xl font-bold italic">Pay just ₹${Math.round(total/12)}/month*</p>
                        </div>

                        <button onclick="payNow('${item.model}', ${total})" 
                                class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase text-lg shadow-xl hover:bg-yellow-400 transition">
                            Buy Now & Proceed
                        </button>
                    </div>
                </div>
            `;
        }

        function payNow(name, amount) {
            new Razorpay({
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": amount * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": name,
                "handler": function(res) { alert("Payment Successful!"); },
                "theme": { "color": "#FFD700" }
            }).open();
        }

        loadProduct();
    </script>
</body>
</html>
