<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details | Hexa Mall Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .buy-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 30px; }
        .media-box { width: 100%; height: 400px; background: #000; border: 1px solid #222; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .thumb { height: 70px; width: 70px; object-fit: contain; background: #111; border: 2px solid #222; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .thumb:hover, .thumb.active { border-color: #E50914; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="pt-24 px-6 md:px-20">
    <div id="product-content" class="max-w-6xl mx-auto pb-20"></div>
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data.json');
            const data = await res.json();
            const item = data.find(p => p.id === id);
            if (!item) {
                document.getElementById('product-content').innerHTML = "<h1 class='text-center'>Product Not Found</h1>";
                return;
            }

            const basePrice = item.price;
            const gst = Math.round(basePrice * 0.18);
            const shipping = item.shipping || 0;
            const netTotal = basePrice + gst + shipping;
            const months = item.emi_months || 12;
            const emiWithInterest = Math.round((netTotal * 1.15) / months);

            // Generate Content
            document.getElementById('product-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-12">
                    <div class="space-y-4">
                        <div id="main-display" class="media-box">
                            <img id="view-img" src="${item.images[0]}" class="w-full h-full object-contain">
                        </div>
                        
                        <div class="flex flex-wrap gap-3" id="thumb-container">
                            ${item.images.map((img, idx) => `
                                <img src="${img}" class="thumb ${idx === 0 ? 'active' : ''}" onclick="changeMedia('${img}', this)">
                            `).join('')}
                            ${item.video ? `
                                <div class="thumb flex items-center justify-center bg-zinc-900" onclick="playVideo('${item.video}', this)">
                                    <i class="fas fa-play text-red-600 text-xl"></i>
                                </div>
                            ` : ''}
                        </div>

                        <div class="bg-zinc-900/50 p-6 rounded-lg border border-zinc-800 flex items-center gap-5">
                            <i class="fas fa-shield-alt text-4xl text-red-600"></i>
                            <div>
                                <h4 class="text-xs font-black uppercase tracking-widest text-zinc-500">Official Warranty</h4>
                                <p class="text-xl font-black italic uppercase">${item.warranty || '3 Months'}</p>
                                <p class="text-[9px] text-zinc-600 uppercase">Hexa Certified Replacement Protection</p>
                            </div>
                        </div>
                    </div>

                    <div class="buy-card">
                        <h1 class="text-4xl font-black uppercase italic">${item.model}</h1>
                        <p class="text-gray-400 mt-2 uppercase font-black text-xs tracking-widest">${item.processor} | ${item.ram} | ${item.ssd}</p>
                        
                        <div class="mt-10 space-y-4 border-t border-zinc-800 pt-8">
                            <div class="flex justify-between text-xs text-zinc-500 uppercase font-black"><span>Base Price</span><span>₹${basePrice.toLocaleString()}</span></div>
                            <div class="flex justify-between text-xs text-zinc-500 uppercase font-black"><span>GST (18%)</span><span>+ ₹${gst.toLocaleString()}</span></div>
                            <div class="flex justify-between text-xs text-zinc-500 uppercase font-black border-b border-zinc-800 pb-4"><span>Shipping</span><span>${shipping === 0 ? 'FREE DELIVERY' : '₹' + shipping}</span></div>
                            
                            <div class="flex justify-between items-center bg-red-900/5 p-6 rounded-xl border border-red-900/20">
                                <div>
                                    <p class="text-[10px] text-red-500 font-black uppercase tracking-widest italic">Approx EMI starts from</p>
                                    <p class="text-4xl font-black italic text-yellow-500">₹${emiWithInterest.toLocaleString()}/mo*</p>
                                </div>
                                <div class="text-right text-[10px] text-gray-500 uppercase font-bold italic">${months} Months</div>
                            </div>
                            
                            <p class="text-[9px] text-gray-600 uppercase font-black tracking-widest italic leading-relaxed">
                                *Disclaimer: 14%-16% interest rate varies by bank (Credit/Debit Card EMI). Final amount will be calculated on payment page by Razorpay.
                            </p>
                        </div>

                        <button onclick="payNow('${item.model}', ${netTotal})" class="w-full bg-red-600 text-white py-5 rounded font-black uppercase text-xl mt-8 shadow-xl hover:bg-white hover:text-black transition-all">
                            Checkout: ₹${netTotal.toLocaleString()}
                        </button>
                        
                        <div class="mt-6 flex justify-center gap-6 text-zinc-600">
                             <div class="text-center"><i class="fas fa-truck block mb-1 text-sm"></i><span class="text-[8px] uppercase font-bold">Fast Delivery</span></div>
                             <div class="text-center"><i class="fas fa-undo block mb-1 text-sm"></i><span class="text-[8px] uppercase font-bold">7 Day Return</span></div>
                             <div class="text-center"><i class="fas fa-lock block mb-1 text-sm"></i><span class="text-[8px] uppercase font-bold">Secure Pay</span></div>
                        </div>
                    </div>
                </div>`;
        }

        // Functions for Media Switcher
        window.changeMedia = (src, el) => {
            document.getElementById('main-display').innerHTML = `<img src="${src}" class="w-full h-full object-contain">`;
            resetThumbs(el);
        };

        window.playVideo = (src, el) => {
            document.getElementById('main-display').innerHTML = `<video src="${src}" controls autoplay></video>`;
            resetThumbs(el);
        };

        function resetThumbs(el) {
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function payNow(name, amount) {
            new Razorpay({
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": amount * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": name,
                "handler": function(res) { window.location.href="success.html"; },
                "theme": { "color": "#E50914" }
            }).open();
        }
        
        load();
    </script>
</body>
</html>
