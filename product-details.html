<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Hexa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .buy-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 25px; }
        #product-img { width: 100%; height: 350px; object-fit: contain; background: #000; border-radius: 8px; border: 1px solid #222; }
    </style>
</head>
<body class="pt-24 px-6 md:px-20">
    <div id="product-content" class="max-w-6xl mx-auto pb-20"></div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data.json');
            const data = await res.json();
            const item = data.find(p => p.id === id);
            if (!item) return;

            const total = Math.round(item.price * 1.18) + (item.shipping || 0);
            const emi = Math.round(total / (item.emi_months || 12));

            document.getElementById('product-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-10">
                    <img id="product-img" src="${item.image}">
                    <div class="buy-card">
                        <h1 class="text-4xl font-black uppercase italic">${item.model}</h1>
                        <p class="text-gray-400 mt-2 uppercase font-bold text-sm">${item.processor} | ${item.ram} | ${item.ssd}</p>
                        
                        <div class="mt-8 space-y-4 border-t border-zinc-800 pt-6">
                            <div class="flex justify-between text-sm text-gray-500 uppercase font-bold"><span>Total (Inc. GST)</span><span>₹${total.toLocaleString()}</span></div>
                            <div class="flex justify-between items-center bg-blue-900/10 p-4 rounded-lg">
                                <div><p class="text-[10px] text-blue-400 font-black uppercase">EMI Starting</p><p class="text-3xl font-black italic text-yellow-500">₹${emi.toLocaleString()}/mo*</p></div>
                                <div class="text-right text-[10px] text-gray-500 uppercase font-bold">Tenure: ${item.emi_months || 12}M</div>
                            </div>
                            <p class="text-[9px] text-gray-600 uppercase font-bold">*Bank interest & fees Extra as per bank policy.</p>
                        </div>

                        <button onclick="payNow('${item.model}', ${total})" class="w-full bg-yellow-500 text-black py-4 rounded font-black uppercase text-lg mt-8">Buy Now & Proceed</button>
                    </div>
                </div>`;
        }
        function payNow(name, amount) {
            new Razorpay({
                "key": "rzp_live_SLFCOQlEEX9giJ",
                "amount": amount * 100,
                "currency": "INR",
                "name": "Hexa Computronics",
                "description": name,
                "handler": function(res) { window.location.href="success.html"; },
                "theme": { "color": "#FFD700" }
            }).open();
        }
        load();
    </script>
</body>
</html>
