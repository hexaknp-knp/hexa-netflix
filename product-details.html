<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Hexa Computronics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; pt-20; }
        .buy-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 30px; }
        .media-box { width: 100%; height: 400px; background: #000; border: 1px solid #222; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .thumb { height: 70px; width: 70px; object-fit: contain; background: #111; border: 2px solid #222; border-radius: 4px; cursor: pointer; }
        .thumb.active { border-color: #E50914; }
    </style>
</head>
<body class="p-6 md:p-20">
    <div id="product-content" class="max-w-6xl mx-auto"></div>
    <script>
        let currentItem = null;
        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data.json');
            const data = await res.json();
            currentItem = data.find(p => p.id === id);
            if (!currentItem) return;

            document.getElementById('product-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-12">
                    <div class="space-y-4">
                        <div id="main-display" class="media-box"><img src="${currentItem.images[0]}" class="w-full h-full object-contain"></div>
                        <div class="flex gap-3">${currentItem.images.map(img => `<img src="${img}" class="thumb" onclick="changeMedia('${img}', this)">`).join('')}</div>
                    </div>
                    <div class="buy-card">
                        <h1 class="text-4xl font-black uppercase italic">${currentItem.model}</h1>
                        <p class="text-zinc-500 mt-4 uppercase text-xs font-bold">${currentItem.processor || ''} | ${currentItem.ram || ''}</p>
                        <div class="mt-10 pt-10 border-t border-zinc-800">
                            <p class="text-4xl font-black text-red-600 italic">₹${currentItem.price.toLocaleString()}</p>
                        </div>
                        <div class="mt-10 space-y-4">
                            <button onclick="addToCart()" class="w-full bg-white text-black py-4 rounded font-black uppercase">Add to Cart</button>
                            <button onclick="location.href='index.html'" class="w-full border border-zinc-700 py-4 rounded font-black uppercase text-xs">Back to Mall</button>
                        </div>
                    </div>
                </div>`;
        }
        function changeMedia(src, el) { 
            document.getElementById('main-display').innerHTML = `<img src="${src}" class="w-full h-full object-contain">`;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('hexaCart')) || [];
            cart.push({ name: currentItem.model, price: currentItem.price, img: currentItem.images[0] });
            localStorage.setItem('hexaCart', JSON.stringify(cart));
            alert("Added to cart!");
        }
        load();
    </script>
</body>
</html>
