<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="canonical" href="https://hexacomputer.in/" />
    <meta name="google-site-verification" content="sOR1l6wNSIt1iPl4JaddWPU3UA196RdzAPdKPteixh8" />
    <title>Product Details | Hexa Computronics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; background-image: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=1200&q=80'); background-attachment: fixed; background-size: cover; }
        
        #navbar { position: sticky; top: 0; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 3px solid #000; }
        
        /* Cart Animation */
        @keyframes cartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .cart-active { animation: cartPop 0.4s ease-out; color: var(--red) !important; }

        .media-box { width: 100%; height: 260px; background: #fff; border: 3px solid #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        @media (min-width: 1024px) { .media-box { height: 400px; } }
        
        .thumb { height: 45px; width: 45px; object-fit: contain; border: 2px solid #000; cursor: pointer; padding: 2px; background: #fff; }
        .thumb.active { border-color: var(--red); border-width: 3px; }
        
        .buy-card { background: rgba(255, 255, 255, 0.98); border: 3px solid #000; padding: 15px; border-radius: 4px; }
        .btn-cart { background: #000; color: #fff; font-weight: 900; text-transform: uppercase; width: 100%; padding: 10px; border: 3px solid #000; font-style: italic; }
        
        .emi-text { color: var(--red); font-weight: 800; font-size: 13px; }
        
        .footer-heading { color: var(--red); font-weight: 900; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .footer-item { color: #333; font-size: 11px; font-weight: 600; text-transform: uppercase; }

        @media (max-width: 768px) {
            .buy-card { padding: 12px; margin-top: 8px; }
            h1 { font-size: 1.4rem !important; }
            .price-tag { font-size: 2.2rem !important; }
        }
    </style>
</head>
<body>

    <nav id="navbar" class="flex justify-between items-center px-4 py-3">
        <a href="index.html" class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Logo" class="h-7">
            <span class="text-[9px] text-red-600 font-black tracking-widest uppercase italic leading-none">Hexa Computronics</span>
        </a>
        <div class="flex items-center gap-4 md:gap-8">
            <!-- Updated Cart Section -->
            <a href="order.html" id="cart-btn" class="flex items-center gap-2 group transition-all">
                <div class="relative">
                    <i class="fas fa-shopping-basket text-xl group-hover:text-red-600"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[8px] w-4 h-4 flex items-center justify-center rounded-full font-black">0</span>
                </div>
                <span class="hidden md:inline text-[10px] font-black uppercase italic border-b-2 border-black group-hover:border-red-600">View Cart</span>
            </a>
            <!-- Updated Back Button -->
            <a href="laptops.html" class="bg-black text-white text-[9px] px-3 py-2 rounded font-black uppercase italic tracking-widest hover:bg-red-600 transition-all">◀ Return to Store</a>
        </div>
    </nav>

    <main id="product-content" class="max-w-7xl mx-auto px-4 py-4 relative z-10"></main>

    <footer class="bg-gray-100 py-16 px-6 md:px-12 border-t-4 border-black text-gray-700 relative z-10">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-10 max-w-7xl mx-auto text-left">
            <div><span class="footer-heading">Quick Links</span><ul class="space-y-2"><li><a href="index.html" class="footer-item">Home Store</a></li><li><a href="laptops.html" class="footer-item">Laptops</a></li><li><a href="desktops.html" class="footer-item">Desktops</a></li><li><a href="accessories.html" class="footer-item">Accessories</a></li></ul></div>
            <div><span class="footer-heading">Support</span><ul class="space-y-2"><li><a href="shipping-policy.html" class="footer-item">Shipping Policy</a></li><li><a href="legal.html" class="footer-item">Legal & Refund</a></li></ul></div>
            <div><span class="footer-heading">Contact Us</span><p class="footer-item leading-relaxed mb-4">119/540 New Basant Building, Kanpur</p><p class="footer-item underline text-black font-black">+91 9935529306</p></div>
            <div class="text-right">
                <span class="footer-heading">Follow Us</span>
                <div class="flex space-x-6 text-3xl mb-6 justify-end">
                    <a href="https://youtube.com/@hexacomptech" target="_blank" style="color: #FF0000;"><i class="fab fa-youtube"></i></a>
                    <a href="https://facebook.com/hexaknp" target="_blank" style="color: #1877F2;"><i class="fab fa-facebook"></i></a>
                    <a href="https://instagram.com/hcomputronics" target="_blank" style="color: #E4405F;"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
        <div class="mt-16 pt-8 border-t border-gray-300 text-center"><p class="text-[9px] font-black text-black uppercase italic tracking-[0.3em]">© 2026 HEXA COMPUTRONICS KANPUR | BY AAMIR</p></div>
    </footer>

    <script>
        let currentItem = null;
        let cart = JSON.parse(localStorage.getItem('hexaCart')) || [];
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRhJ6oW7vvPyPTyOfy4uN_ngU8DAPmLPQPSnzuYGIlars_FcIbZmUK9ah1O4mgJ1YgfZILaplezmbkz/pub?output=csv";

        function csvToJSON(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim());
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const obj = {};
                const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                headers.forEach((header, index) => {
                    let val = currentline[index] ? currentline[index].trim().replace(/^"|"$/g, '') : '';
                    if(header === 'images') val = val.split(',').map(img => img.trim());
                    if(header === 'price') val = parseInt(val) || 0;
                    obj[header] = val;
                });
                result.push(obj);
            }
            return result;
        }

        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            const contentArea = document.getElementById('product-content');
            contentArea.innerHTML = `<div class="flex flex-col items-center justify-center py-24"><div class="animate-spin rounded-full h-12 w-12 border-b-4 border-red-600 mb-4"></div><p class="text-[10px] font-black uppercase italic tracking-widest">Loading Details...</p></div>`;

            try {
                const res = await fetch(sheetURL);
                const csvText = await res.text();
                const data = csvToJSON(csvText);
                currentItem = data.find(p => p.id === id);
                if (!currentItem) { contentArea.innerHTML = "<div class='text-center py-20 font-black'>Product Not Found</div>"; return; }

                updateCartBadge();
                const approxEMI = Math.round((currentItem.price * 1.15) / 12);

                contentArea.innerHTML = `
                    <div class="grid lg:grid-cols-2 gap-4">
                        <div class="space-y-3">
                            <div id="main-display" class="media-box"><img src="${currentItem.images[0]}" class="w-full h-full object-contain p-4"></div>
                            <div class="flex flex-wrap gap-2">${currentItem.images.map((img, idx) => `<img src="${img}" class="thumb ${idx===0?'active':''}" onclick="changeMedia('${img}', this)">`).join('')}</div>
                            <div class="py-2">
                                <p class="text-[11px] font-black uppercase tracking-tight text-black"><i class="fas fa-microchip text-red-600 mr-1"></i> ${currentItem.processor || ''} • ${currentItem.ram || ''} RAM • ${currentItem.ssd || 'Certified SSD'}</p>
                            </div>
                        </div>
                        <div class="buy-card">
                            <h1 class="text-xl md:text-4xl font-black uppercase italic leading-none mb-2">${currentItem.model}</h1>
                            <p class="price-tag text-4xl md:text-5xl font-black italic text-red-600 leading-none">₹${currentItem.price.toLocaleString()}</p>
                            <div class="mt-4 flex items-center gap-3">
                                <label class="font-black uppercase text-[10px]">Qty:</label>
                                <div class="flex border-2 border-black rounded overflow-hidden">
                                    <button onclick="changeQty(-1)" class="px-3 py-1 bg-gray-100 font-black text-xs">-</button>
                                    <input type="number" id="item-qty" value="1" min="1" class="w-8 text-center font-black text-xs outline-none" readonly>
                                    <button onclick="changeQty(1)" class="px-3 py-1 bg-gray-100 font-black text-xs">+</button>
                                </div>
                            </div>
                            <button onclick="addToCart()" class="btn-cart text-xs mt-4 shadow-lg hover:bg-red-600 transition-all">Add To Cart</button>
                        </div>
                    </div>`;
            } catch (e) { contentArea.innerHTML = "<div class='text-center py-20 font-black'>Error Loading Data.</div>"; }
        }

        function changeQty(v) {
            const i = document.getElementById('item-qty');
            if (i && (parseInt(i.value) + v >= 1)) i.value = parseInt(i.value) + v;
        }

        function addToCart() {
            if(!currentItem) return;
            const qty = parseInt(document.getElementById('item-qty').value);
            const idx = cart.findIndex(p => p.id === currentItem.id);
            if(idx > -1) cart[idx].qty += qty;
            else cart.push({ id: currentItem.id, name: currentItem.model, price: currentItem.price, img: currentItem.images[0], qty: qty });
            localStorage.setItem('hexaCart', JSON.stringify(cart));
            
            // Trigger Cart Animation
            const cartBtn = document.getElementById('cart-btn');
            cartBtn.classList.add('cart-active');
            setTimeout(() => cartBtn.classList.remove('cart-active'), 400);

            updateCartBadge();
            alert("Product added to cart! Check the basket icon at the top.");
        }

        function updateCartBadge() { 
            const badge = document.getElementById('cart-count');
            if(badge) badge.innerText = cart.reduce((s, i) => s + i.qty, 0); 
        }

        window.changeMedia = (src, el) => {
            document.getElementById('main-display').innerHTML = `<img src="${src}" class="w-full h-full object-contain p-4">`;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        load();
    </script>
</body>
</html>
