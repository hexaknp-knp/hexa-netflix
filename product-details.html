<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details | Hexa Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .buy-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 30px; }
        .media-box { width: 100%; height: 400px; background: #000; border: 1px solid #222; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .thumb { height: 70px; width: 70px; object-fit: contain; background: #111; border: 2px solid #222; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .thumb.active { border-color: #E50914; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="pt-24 px-6 md:px-20">
    <div id="product-content" class="max-w-6xl mx-auto pb-20"></div>

    <script>
        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data.json');
            const data = await res.json();
            const item = data.find(p => p.id === id);
            if (!item) return;

            const basePrice = item.price;
            const gst = Math.round(basePrice * 0.18);
            const shipping = item.shipping || 0;
            const netTotal = basePrice + gst + shipping;
            const emi = Math.round((netTotal * 1.15) / (item.emi_months || 12));

            document.getElementById('product-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-12">
                    <div class="space-y-4">
                        <div id="main-display" class="media-box"><img src="${item.images[0]}" class="w-full h-full object-contain"></div>
                        <div class="flex flex-wrap gap-3">
                            ${item.images.map((img, idx) => `<img src="${img}" class="thumb ${idx===0?'active':''}" onclick="changeMedia('${img}', this)">`).join('')}
                            ${item.video ? `<div class="thumb flex items-center justify-center bg-zinc-900" onclick="playVideo('${item.video}', this)"><i class="fas fa-play text-red-600"></i></div>` : ''}
                        </div>
                        <div class="bg-zinc-900/50 p-6 rounded-lg border border-zinc-800 flex items-center gap-5">
                            <i class="fas fa-shield-alt text-4xl text-red-600"></i>
                            <div><p class="text-xl font-black italic uppercase">${item.warranty || '3 Months'}</p><p class="text-[9px] text-zinc-600 uppercase">Replacement Warranty</p></div>
                        </div>
                    </div>
                    <div class="buy-card">
                        <h1 class="text-4xl font-black uppercase italic leading-none">${item.model}</h1>
                        <p class="text-gray-500 mt-2 uppercase font-black text-xs">${item.processor} | ${item.ram}</p>
                        <div class="mt-8 space-y-4 border-t border-zinc-800 pt-8 text-xs text-zinc-500 uppercase font-black">
                            <div class="flex justify-between"><span>Base Price</span><span>₹${basePrice.toLocaleString()}</span></div>
                            <div class="flex justify-between"><span>GST (18%)</span><span>+ ₹${gst.toLocaleString()}</span></div>
                            <div class="flex justify-between border-b border-zinc-800 pb-4"><span>Shipping</span><span>${shipping===0?'FREE':'₹'+shipping}</span></div>
                            <div class="flex justify-between items-center bg-red-900/5 p-6 rounded-xl border border-red-900/20">
                                <div><p class="text-[10px] text-red-500 font-black italic">Approx EMI</p><p class="text-4xl font-black italic text-yellow-500">₹${emi.toLocaleString()}/mo*</p></div>
                                <div class="text-right font-bold italic">${item.emi_months || 12}M</div>
                            </div>
                        </div>
                        <button onclick="goToOrder('${item.id}')" class="w-full bg-red-600 text-white py-5 rounded font-black uppercase text-xl mt-8 shadow-xl hover:bg-red-700 transition">
                            Buy Now & Pay
                        </button>
                    </div>
                </div>`;
        }

        // Logic to send customer to order page
        function goToOrder(productId) {
            window.location.href = `order.html?id=${productId}`;
        }

        window.changeMedia = (src, el) => {
            document.getElementById('main-display').innerHTML = `<img src="${src}" class="w-full h-full object-contain">`;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        window.playVideo = (src, el) => {
            document.getElementById('main-display').innerHTML = `<video src="${src}" controls autoplay></video>`;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        load();
    </script>
</body>
</html>
