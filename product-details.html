<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Product Details | Hexa Computronics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #E50914; --bg: #ffffff; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; background-image: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=1200&q=80'); background-attachment: fixed; background-size: cover; }
        
        #navbar { position: sticky; top: 0; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 3px solid #000; }
        
        /* Compact Media Box for Mobile */
        .media-box { width: 100%; height: 280px; background: #fff; border: 3px solid #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        @media (min-width: 1024px) { .media-box { height: 420px; } }
        
        .thumb { height: 50px; width: 50px; object-fit: contain; border: 2px solid #000; cursor: pointer; padding: 3px; background: #fff; }
        .thumb.active { border-color: var(--red); border-width: 3px; }
        
        .buy-card { background: rgba(255, 255, 255, 0.98); border: 3px solid #000; padding: 20px; border-radius: 4px; box-shadow: 10px 10px 0px rgba(0,0,0,0.1); }
        .btn-cart { background: #000; color: #fff; font-weight: 900; text-transform: uppercase; width: 100%; padding: 12px; border: 3px solid #000; font-style: italic; }
        
        .emi-box { background: #fdf2f2; border-left: 5px solid var(--red); padding: 10px; margin: 10px 0; }
        
        /* Configuration Section */
        .specs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; }
        .spec-item { background: #f3f4f6; padding: 8px; border-radius: 4px; border: 1px solid #ddd; }

        @media (max-width: 768px) {
            .buy-card { padding: 15px; margin-top: 10px; }
            h1 { font-size: 1.5rem !important; }
            .price-tag { font-size: 2.5rem !important; }
        }

        .footer-heading { color: var(--red); font-weight: 900; text-transform: uppercase; font-size: 11px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <nav id="navbar" class="flex justify-between items-center px-4 py-2">
        <a href="index.html" class="flex flex-col items-center">
            <img src="assets/newlogo.png" alt="Logo" class="h-7">
            <span class="text-[9px] text-red-600 font-black tracking-widest uppercase italic">Hexa Computronics</span>
        </a>
        <div class="flex items-center gap-4">
            <a href="order.html" class="relative"><i class="fas fa-shopping-basket text-xl"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[8px] w-4 h-4 flex items-center justify-center rounded-full">0</span></a>
            <a href="index.html" class="text-[9px] font-black uppercase border-b-2 border-black italic">Back</a>
        </div>
    </nav>

    <main id="product-content" class="max-w-7xl mx-auto px-4 py-6 relative z-10"></main>

    <footer class="bg-gray-100 py-10 px-6 border-t-4 border-black text-[10px] font-bold uppercase">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 max-w-7xl mx-auto">
            <div><span class="footer-heading">Links</span><ul class="space-y-1"><li><a href="index.html">Home</a></li><li><a href="laptops.html">Laptops</a></li></ul></div>
            <div><span class="footer-heading">Support</span><ul class="space-y-1"><li><a href="shipping-policy.html">Shipping</a></li><li><a href="legal.html">Legal</a></li></ul></div>
            <div><span class="footer-heading">Store</span><p>Gumti No.5, Kanpur</p><p class="text-black">+91 9935529306</p></div>
            <div class="text-right">
                <span class="footer-heading">Follow</span>
                <div class="flex justify-end gap-3 text-xl"><i class="fab fa-youtube text-red-600"></i><i class="fab fa-facebook text-blue-600"></i></div>
            </div>
        </div>
    </footer>

    <script>
        let currentItem = null;
        let cart = JSON.parse(localStorage.getItem('hexaCart')) || [];

        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data.json');
            const data = await res.json();
            currentItem = data.find(p => p.id === id);
            if (!currentItem) return;

            updateCartBadge();
            const approxEMI = Math.round((currentItem.price * 1.15) / 12);

            document.getElementById('product-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div id="main-display" class="media-box"><img src="${currentItem.images[0]}" class="w-full h-full object-contain p-4"></div>
                        <div class="flex flex-wrap gap-2">${currentItem.images.map((img, idx) => `<img src="${img}" class="thumb ${idx===0?'active':''}" onclick="changeMedia('${img}', this)">`).join('')}</div>
                        
                        <div class="bg-white border-2 border-black p-4 rounded">
                            <h3 class="font-black text-xs uppercase border-b border-gray-200 pb-2 mb-2 italic"><i class="fas fa-microchip mr-2 text-red-600"></i>Product Specifications</h3>
                            <div class="specs-grid">
                                <div class="spec-item"><p class="text-[8px] text-gray-500 uppercase font-bold">Processor</p><p class="text-[10px] font-black">${currentItem.processor || 'N/A'}</p></div>
                                <div class="spec-item"><p class="text-[8px] text-gray-500 uppercase font-bold">RAM Memory</p><p class="text-[10px] font-black">${currentItem.ram || 'N/A'}</p></div>
                                <div class="spec-item"><p class="text-[8px] text-gray-500 uppercase font-bold">Storage</p><p class="text-[10px] font-black">${currentItem.ssd || 'Certified SSD'}</p></div>
                                <div class="spec-item"><p class="text-[8px] text-gray-500 uppercase font-bold">Condition</p><p class="text-[10px] font-black text-green-600">Certified Business Grade</p></div>
                            </div>
                            <p class="text-[9px] mt-4 text-gray-600 leading-tight"><b>Note:</b> ${currentItem.description || 'This is a premium business class hardware, thoroughly tested for performance and reliability.'}</p>
                        </div>
                    </div>

                    <div class="buy-card">
                        <h1 class="text-2xl md:text-4xl font-black uppercase italic leading-tight">${currentItem.model}</h1>
                        
                        <div class="mt-4 border-t-2 border-black pt-4">
                            <p class="price-tag text-4xl md:text-5xl font-black italic text-red-600 leading-none">₹${currentItem.price.toLocaleString()}</p>
                            
                            <div class="emi-box">
                                <p class="text-[9px] font-black text-red-600 uppercase">EMI Start ₹${approxEMI.toLocaleString()}/mo*</p>
                                <p class="text-[7px] text-gray-500 uppercase font-bold">*T&C Apply. Interest by bank rules.</p>
                            </div>

                            <div class="mt-4 flex items-center gap-3">
                                <label class="font-black uppercase text-[10px]">Qty:</label>
                                <div class="flex border-2 border-black rounded overflow-hidden">
                                    <button onclick="changeQty(-1)" class="px-3 py-1 bg-gray-100 font-black">-</button>
                                    <input type="number" id="item-qty" value="1" min="1" class="w-8 text-center font-black text-xs outline-none" readonly>
                                    <button onclick="changeQty(1)" class="px-3 py-1 bg-gray-100 font-black">+</button>
                                </div>
                            </div>

                            <button onclick="addToCart()" class="btn-cart text-sm mt-4 shadow-lg hover:bg-red-600 transition-all">Add To Cart</button>
                            <button onclick="window.location.href='order.html'" class="w-full mt-2 border-2 border-black py-2 rounded font-black uppercase text-[10px] hover:bg-gray-100 transition">Buy Now</button>
                            
                            <div class="bg-gray-50 p-2 border-2 border-dashed border-gray-300 rounded text-center mt-4">
                                <p class="text-[8px] font-black uppercase mb-2">We Accept</p>
                                <div class="flex justify-center gap-4 text-xl">
                                    <i class="fab fa-google-pay" style="color: #4285F4;"></i> 
                                    <i class="fab fa-cc-visa" style="color: #1A1F71;"></i> 
                                    <i class="fab fa-cc-mastercard" style="color: #EB001B;"></i> 
                                    <i class="fas fa-qrcode" style="color: #00b894;"></i>
                                </div>
                                <p class="text-[7px] font-bold uppercase mt-1">UPI • Cards • Net Banking</p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function changeQty(v) {
            const i = document.getElementById('item-qty');
            if (parseInt(i.value) + v >= 1) i.value = parseInt(i.value) + v;
        }

        function addToCart() {
            const qty = parseInt(document.getElementById('item-qty').value);
            const idx = cart.findIndex(p => p.id === currentItem.id);
            if(idx > -1) cart[idx].qty += qty;
            else cart.push({ id: currentItem.id, name: currentItem.model, price: currentItem.price, img: currentItem.images[0], qty: qty });
            localStorage.setItem('hexaCart', JSON.stringify(cart));
            updateCartBadge();
            alert("Added to cart!");
        }

        function updateCartBadge() { document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0); }
        window.changeMedia = (src, el) => {
            document.getElementById('main-display').innerHTML = `<img src="${src}" class="w-full h-full object-contain p-4">`;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };
        load();
    </script>
</body>
</html>
