<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Hexa Computronics Kanpur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; }
        .gold-text { color: #FFD700; }
        .contact-card { background: #111; border: 1px solid #222; transition: 0.3s; }
        .contact-card:hover { border-color: #FFD700; background: #151515; }
        .purple-glow { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); }
    </style>
</head>
<body class="pt-24 px-6 md:px-12">

    <nav class="fixed top-0 left-0 w-full bg-black/95 p-4 border-b border-zinc-800 z-50 flex justify-between px-10">
        <div class="flex items-center">
            <img src="assets/newlogo.jpg" class="h-10 purple-glow mr-3">
            <span class="gold-text font-bold text-xl tracking-tighter uppercase">Contact Hexa</span>
        </div>
        <a href="index.html" class="text-gray-400 hover:text-white mt-2 font-bold tracking-widest text-sm">HOME</a>
    </nav>

    <main class="max-w-6xl mx-auto py-12">
        <h1 class="text-5xl font-black mb-16 text-center uppercase tracking-tighter">Get In <span class="gold-text">Touch</span></h1>

        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <div class="contact-card p-8 rounded-2xl">
                    <h3 class="text-xl font-bold gold-text mb-4 uppercase italic">Store Location</h3>
                    <p class="text-gray-300 leading-relaxed">
                        <i class="fas fa-map-marker-alt mr-3 gold-text"></i>
                        119/540 New Basant Cinema Building, <br>
                        Gumti No.5, Kanpur, Uttar Pradesh - 208012
                    </p>
                </div>

                <div class="contact-card p-8 rounded-2xl">
                    <h3 class="text-xl font-bold gold-text mb-4 uppercase italic">Direct Support</h3>
                    <p class="mb-4"><i class="fab fa-whatsapp mr-3 text-green-500"></i> +91 9935529306</p>
                    <p><i class="fas fa-envelope mr-3 text-blue-400"></i> info@hexacomputer.in</p>
                </div>
            </div>

            <div class="contact-card p-8 rounded-2xl">
                <h3 class="text-xl font-bold gold-text mb-8 uppercase italic text-center">Follow Our Tech Community</h3>
                <div class="grid grid-cols-2 gap-6">
                    <a href="https://youtube.com/@hexacomptech" target="_blank" class="flex flex-col items-center p-4 bg-zinc-900 rounded-xl hover:scale-105 transition">
                        <i class="fab fa-youtube text-4xl mb-2" style="color: #FF0000;"></i>
                        <span class="text-xs">@hexacomptech</span>
                    </a>
                    <a href="https://facebook.com/hexacomputronis" target="_blank" class="flex flex-col items-center p-4 bg-zinc-900 rounded-xl hover:scale-105 transition">
                        <i class="fab fa-facebook text-4xl mb-2" style="color: #1877F2;"></i>
                        <span class="text-xs">@hexacomputronis</span>
                    </a>
                    <a href="https://instagram.com/hcomputronics" target="_blank" class="flex flex-col items-center p-4 bg-zinc-900 rounded-xl hover:scale-105 transition">
                        <i class="fab fa-instagram text-4xl mb-2" style="color: #E4405F;"></i>
                        <span class="text-xs">@hcomputronics</span>
                    </a>
                    <a href="https://wa.me/919935529306" target="_blank" class="flex flex-col items-center p-4 bg-zinc-900 rounded-xl hover:scale-105 transition">
                        <i class="fab fa-whatsapp text-4xl mb-2" style="color: #25D366;"></i>
                        <span class="text-xs">WhatsApp</span>
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
